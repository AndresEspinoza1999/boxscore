        </div>
        {reviews.length===0?<div className="empty" style={{paddingTop:24}}><div className="empty-icon">💬</div><p>Be the first to review this game</p></div>:(
          <div className="gap-stack" style={{paddingBottom:20}}>
            {[...reviews].sort((a,b)=>reviewSort==='top'?b.rating-a.rating:reviewSort==='low'?a.rating-b.rating:new Date(b.date)-new Date(a.date)).map(r=>(
              <div key={r.id} className="review-card">
                <div className="review-card-top">
                  <div><div className="reviewer-name" onClick={r.userId!==state.currentUser.id?()=>navigate('public_profile',{userId:r.userId,username:r.user}):undefined} style={r.userId!==state.currentUser.id?{cursor:'pointer',color:'var(--accent)'}:{}}>{r.userId===state.currentUser.id?<span style={{color:'var(--accent)'}}>⭐ {state.currentUser.name}</span>:r.user}</div><Stars rating={r.rating} size={12}/></div>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span className="review-date">{formatDate(r.date)}</span>
                    {r.userId===state.currentUser.id&&<button onClick={()=>{if(window.confirm('Delete your review?')){dispatch({type:'DELETE_REVIEW',reviewId:r.id});showToast('Review deleted');}}} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text3)',fontSize:14}}>🗑</button>}
                  </div>
                </div>
                <p className="review-body">{r.text}</p>
                {r.players&&r.players.length>0&&(
                  <div style={{display:'flex',flexWrap:'wrap',gap:5,marginTop:8}}>
                    {r.players.map((p,i)=>(
                      <div key={i} style={{display:'inline-flex',alignItems:'center',gap:5,background:'var(--s3)',border:'1px solid var(--border)',borderRadius:8,padding:'3px 9px'}}>
                        <span style={{fontSize:12,fontWeight:700,color:'var(--text2)'}}>{p.name}</span>
                        <span style={{fontSize:11,fontWeight:900,color:gradeColor(p.grade)}}>{p.grade}</span>
                      </div>
                    ))}
                  </div>
                )}
                {r.videoUrl&&<VideoPreview url={r.videoUrl}/>}
                <LikeBtn reviewId={r.id} likes={r.likes} currentUserId={state.currentUser.id} onToggle={id=>dispatch({type:'TOGGLE_LIKE',reviewId:id})}/>
              </div>
            ))}
          </div>
        )}
      </div>
      {showReview&&<ReviewSheet game={game} existing={myReview} onClose={()=>setShowReview(false)} onSubmit={submitReview}/>}
      {showSeriesEditor&&<SeriesEditor game={game} onSave={saveSeries} onClose={()=>setShowSeriesEditor(false)}/>}
      {showAddToList&&<AddToListModal gameId={gameId} state={state} dispatch={dispatch} showToast={showToast} onClose={()=>setShowAddToList(false)}/>}
    </div>
  );
}

/* ── LEADERBOARD PAGE ── */
function LeaderboardPage({ state, navigate }) {
  const [sport,setSport]=useState('all');
  const ranked=useMemo(()=>state.games.filter(g=>sport==='all'||g.sport===sport).map(g=>{const rv=state.reviews.filter(r=>r.gameId===g.id);return{...g,avg:avgRating(rv),cnt:rv.length};}).filter(g=>g.cnt>0).sort((a,b)=>b.avg!==a.avg?b.avg-a.avg:b.cnt-a.cnt),[state,sport]);
  const followingIds = useMemo(()=>(state.follows||[]).map(f=>f.following_id),[state.follows]);
  const friendsActivity = useMemo(()=>{if(!followingIds.length)return[];return state.reviews.filter(r=>followingIds.includes(r.userId)).slice(0,8);},[state.reviews,followingIds]);
  const rankStyle=i=>i===0?'gold':i===1?'silver':i===2?'bronze':'';
  const rankEmoji=i=>i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1;
  return (
    <div className="page">
      <div className="app-hd"><div><div className="logo-desktop-hide"><BoxscoreLogo fontSize={26}/></div><div className="app-sub">Top rated games</div></div><span style={{fontSize:24}}>🏆</span></div>
      {friendsActivity.length>0&&sport==='all'&&(
        <div style={{padding:'0 16px 4px'}}>
          <div className="section-hd" style={{padding:'8px 0'}}><span className="section-title">👥 Friends</span></div>
          <div className="gap-stack" style={{marginBottom:4}}>
            {friendsActivity.slice(0,4).map(r=>{
              const g=[...(state.apiGames||[]),...state.games].find(g=>g.id===r.gameId);
              if(!g)return null;
              return(
                <div key={r.id} className="activity-row" onClick={()=>navigate('game',{gameId:r.gameId})}>
                  <div className="activity-avatar" style={{background:getSportColor(g.sport),color:'#000',fontWeight:900}}>{r.user?r.user.charAt(0).toUpperCase():'?'}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:700}}>
                      <span style={{cursor:'pointer',color:'var(--accent)'}} onClick={e=>{e.stopPropagation();navigate('public_profile',{userId:r.userId,username:r.user});}}>{r.user}</span>
                      {' reviewed '}<span style={{color:'var(--text)'}}>{abbr(g.away)} vs {abbr(g.home)}</span>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:6,marginTop:2}}>
                      <Stars rating={r.rating} size={11}/>
                      {r.text&&<span style={{fontSize:12,color:'var(--text3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.text}</span>}
                    </div>
                  </div>
                  <span className={`sport-badge sc-${g.sport}`} style={{['--sport-c']:getSportColor(g.sport),flexShrink:0}}>{getSportMeta(g.sport).emoji}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}
      <div className="sport-scroll">{SPORTS.map(s=><div key={s.id} className={`s-pill sc-${s.id}${sport===s.id?' active':''}`} onClick={()=>setSport(s.id)}>{s.id!=='all'&&<span className="s-dot"/>}{s.emoji} {s.label}</div>)}</div>
      <div style={{padding:'0 16px 20px'}} className="gap-stack">
        {ranked.length===0?<div className="empty"><div className="empty-icon">🏆</div><p>No rated games yet.<br/>Go review some!</p></div>:ranked.map((g,i)=>(
          <div key={g.id} className={`lb-row sc-${g.sport}`} style={{['--sport-c']:getSportColor(g.sport)}} onClick={()=>navigate('game',{gameId:g.id})}>
            <div className={`lb-rank ${rankStyle(i)}`}>{rankEmoji(i)}</div>
            <div className="lb-info"><div className="lb-teams">{abbr(g.away)} vs {abbr(g.home)}</div><div className="lb-meta"><span style={{color:getSportColor(g.sport)}}>{getSportMeta(g.sport).label}</span>{' · '}{formatShort(g.date)}</div></div>
            <div className="lb-right"><div className="lb-avg">{g.avg.toFixed(1)} ★</div><div className="lb-cnt">{g.cnt} review{g.cnt!==1?'s':''}</div></div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── USER ROW (Friends page) ── */
function UserRow({ user, state, dispatch, navigate, showToast }) {
  const [menuOpen, setMenuOpen] = useState(false);
  const [frBusy, setFrBusy]    = useState(false);
  const isFollowing = (state.follows||[]).some(f=>f.following_id===user.id);
  const isBlocked   = (state.blocks||[]).some(b=>b.blocked_id===user.id);
  const isSelf      = state.currentUser.id === user.id;
  const colors = ['#ff6b35','#4895ef','#47d98e','#e5383b','#00c3ff','#f0bf3d'];
  const ac = n => colors[(n||'').charCodeAt(0)%colors.length];

  // Friend request state
  const reqs   = state.friendRequests||[];
  const myId   = state.currentUser.id;
  const outgoing = reqs.find(r=>r.fromUserId===myId&&r.toUserId===user.id);
  const incoming = reqs.find(r=>r.fromUserId===user.id&&r.toUserId===myId);
  const isFriends = reqs.some(r=>((r.fromUserId===myId&&r.toUserId===user.id)||(r.fromUserId===user.id&&r.toUserId===myId))&&r.status==='accepted');

  const friendAction = async() => {
    setFrBusy(true);
    if(incoming?.status==='pending'){
      await dispatch({type:'ACCEPT_FRIEND_REQUEST',requestId:incoming.id});
      showToast('🎉 Friends with '+user.username+'!');
    } else if(outgoing?.status==='pending'){
      await dispatch({type:'CANCEL_FRIEND_REQUEST',requestId:outgoing.id});
      showToast('Request cancelled');
    } else if(!isFriends){
      const r=await dispatch({type:'SEND_FRIEND_REQUEST',userId:user.id,username:user.username});
      showToast(r?.ok?'Friend request sent!':'Already sent or error');
    }
    setFrBusy(false);
  };

  // Label + style for the friend button
  const friendLabel = isFriends?'Friends ✓':incoming?.status==='pending'?'Accept 🤝':outgoing?.status==='pending'?'Pending…':'+ Friend';
  const friendStyle = isFriends?'btn-ghost':incoming?.status==='pending'?'btn-primary':outgoing?.status==='pending'?'btn-ghost':'btn-ghost';

  if(isSelf) return null;
  return (
    <div style={{display:'flex',alignItems:'center',gap:10,padding:'11px 0',borderBottom:'1px solid var(--border)',position:'relative'}}>
      <div className="activity-avatar" style={{background:`${ac(user.username)}22`,color:ac(user.username),cursor:'pointer',flexShrink:0}}
        onClick={()=>navigate('public_profile',{userId:user.id,username:user.username})}>
        {(user.username||'?').charAt(0).toUpperCase()}
      </div>
      <div style={{flex:1,minWidth:0,cursor:'pointer'}} onClick={()=>navigate('public_profile',{userId:user.id,username:user.username})}>
        <div style={{fontSize:14,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.username}</div>
        {isFriends&&<div style={{fontSize:10,color:'var(--green)',fontWeight:700}}>Friends</div>}
        {isBlocked&&<div style={{fontSize:11,color:'var(--red)',fontWeight:600}}>Blocked</div>}
      </div>
      {isBlocked ? (
        <button className="btn btn-ghost btn-sm" onClick={()=>{dispatch({type:'UNBLOCK',userId:user.id});showToast('Unblocked');}}>Unblock</button>
      ) : (
        <>
          {/* Friend button */}
          {!isFriends&&(
            <button className={`btn btn-sm ${incoming?.status==='pending'?'btn-primary':'btn-ghost'}`}
              disabled={frBusy}
              style={{fontSize:12,padding:'6px 11px',flexShrink:0,
                ...(incoming?.status==='pending'?{}:{borderColor:'var(--accent)',color:'var(--accent)'})}}
              onClick={friendAction}>
              {frBusy?'…':friendLabel}
            </button>
          )}
          {isFriends&&(
            <span style={{fontSize:11,color:'var(--green)',fontWeight:700,flexShrink:0}}>✓ Friends</span>
          )}
          {/* Follow button */}
          <button className={"btn btn-sm "+(isFollowing?'btn-ghost':'btn-primary')}
            style={{fontSize:12,padding:'6px 11px',flexShrink:0}}
            onClick={()=>{dispatch({type:isFollowing?'UNFOLLOW':'FOLLOW',userId:user.id,username:user.username});showToast(isFollowing?'Unfollowed':('Following '+user.username+'!'));}}>
            {isFollowing?'Following ✓':'Follow'}
          </button>
          {/* ⋯ menu */}
          <div style={{position:'relative'}}>
            <button className="btn btn-ghost btn-sm" style={{padding:'4px 8px',fontSize:16,lineHeight:1,flexShrink:0}} onClick={e=>{e.stopPropagation();setMenuOpen(v=>!v);}}>⋯</button>
            {menuOpen&&(
              <div style={{position:'absolute',right:0,top:'calc(100% + 4px)',background:'var(--s3)',border:'1px solid var(--border)',borderRadius:12,padding:'4px 0',zIndex:200,minWidth:140,boxShadow:'0 6px 24px rgba(0,0,0,0.45)'}}
                onClick={e=>e.stopPropagation()}>
                {isFollowing&&<div style={{padding:'11px 16px',fontSize:13,fontWeight:600,cursor:'pointer',borderBottom:'1px solid var(--border)'}}
                  onClick={()=>{dispatch({type:'UNFOLLOW',userId:user.id});setMenuOpen(false);showToast('Unfollowed');}}>Unfollow</div>}
                <div style={{padding:'11px 16px',fontSize:13,fontWeight:600,cursor:'pointer',color:'var(--red)'}}
                  onClick={()=>{dispatch({type:'BLOCK',userId:user.id,username:user.username});setMenuOpen(false);showToast('User blocked');}}>Block</div>
              </div>
            )}
          </div>
        </>
      )}
    </div>
  );
}

/* ── REQUEST ROW (used in FriendsPage requests tab) ── */
function RequestRow({req, dispatch, navigate, showToast, ac, type}) {
  const [busy,setBusy]=useState(false);
  const isSent=type==='sent';
  const name=isSent?req.toUsername:req.fromUsername;
  const uid=isSent?req.toUserId:req.fromUserId;
  const handle=async(actionType)=>{
    setBusy(true);
    await dispatch({type:actionType,requestId:req.id});
    setBusy(false);
    if(actionType==='ACCEPT_FRIEND_REQUEST') showToast('🎉 Friends with '+name+'!');
    else if(actionType==='DECLINE_FRIEND_REQUEST') showToast('Request declined');
    else showToast('Request cancelled');
  };
  return(
    <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 0',borderBottom:'1px solid var(--border)'}}>
      <div style={{cursor:'pointer',display:'flex',alignItems:'center',gap:12,flex:1,minWidth:0}} onClick={()=>navigate('public_profile',{userId:uid,username:name})}>
        <div className="activity-avatar" style={{background:(ac(name)||'#888')+'22',color:ac(name)||'#888',flexShrink:0,width:44,height:44,fontSize:16}}>
          {(name||'?')[0].toUpperCase()}
        </div>
        <div style={{minWidth:0}}>
          <div style={{fontWeight:700,fontSize:14,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{name}</div>
          <div style={{fontSize:11,color:'var(--text3)'}}>{isSent?'Request pending…':'Wants to be friends'}</div>
        </div>
      </div>
      {isSent?(
        <button className="btn btn-ghost btn-sm" disabled={busy} style={{fontSize:11,padding:'5px 10px',flexShrink:0}} onClick={()=>handle('CANCEL_FRIEND_REQUEST')}>Cancel</button>
      ):(
        <div style={{display:'flex',gap:6,flexShrink:0}}>
          <button className="btn btn-primary btn-sm" disabled={busy} style={{padding:'6px 12px',fontSize:12}} onClick={()=>handle('ACCEPT_FRIEND_REQUEST')}>Accept</button>
          <button className="btn btn-ghost btn-sm" disabled={busy} style={{padding:'6px 10px',fontSize:12}} onClick={()=>handle('DECLINE_FRIEND_REQUEST')}>✕</button>
        </div>
      )}
    </div>
  );
}

/* ── FOLLOW LIST MODAL (followers / following) ── */
function FollowListModal({ type, userId, state, dispatch, navigate, showToast, onClose }) {
  const [users, setUsers] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(()=>{
    async function load(){
      let ids=[];
      if(type==='following'){
        const {data}=await sb.from('follows').select('following_id').eq('follower_id',userId);
        ids=(data||[]).map(f=>f.following_id);
      } else {
        const {data}=await sb.from('follows').select('follower_id').eq('following_id',userId);
        ids=(data||[]).map(f=>f.follower_id);
      }
      if(ids.length){
        const {data:profiles}=await sb.from('profiles').select('id,username,avatar_url').in('id',ids);
        setUsers(profiles||[]);
      } else setUsers([]);
      setLoading(false);
    }
    load();
  },[userId,type]);
  return(
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="sheet" style={{maxHeight:'75vh',display:'flex',flexDirection:'column'}}>
        <div className="sheet-handle"/>
        <div style={{fontSize:17,fontWeight:800,marginBottom:12,flexShrink:0}}>{type==='following'?'Following':'Followers'}</div>
        {loading?<div className="spinner" style={{margin:'20px auto'}}/>
          :!users?.length?<div className="empty"><p>{type==='following'?'Not following anyone yet':'No followers yet'}</p></div>
          :<div style={{overflowY:'auto',flex:1}}>
            {users.map(u=>{
              const isMe=u.id===state.currentUser.id;
              const isFollowing=(state.follows||[]).some(f=>f.follower_id===state.currentUser.id&&f.following_id===u.id);
              return(
                <div key={u.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
                  <div style={{cursor:'pointer',display:'flex',alignItems:'center',gap:12,flex:1,minWidth:0}}
                    onClick={()=>{if(isMe)return;navigate('public_profile',{userId:u.id,username:u.username});onClose();}}>
                    <AvatarImg name={u.username} url={u.avatar_url} size={40}/>
                    <div style={{fontWeight:700,fontSize:14,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{u.username}</div>
                  </div>
                  {!isMe&&(
                    <button className={`btn btn-sm ${isFollowing?'btn-ghost':'btn-primary'}`} style={{flexShrink:0,padding:'6px 14px',fontSize:12}}
                      onClick={()=>{dispatch({type:isFollowing?'UNFOLLOW':'FOLLOW',userId:u.id,username:u.username});showToast(isFollowing?'Unfollowed':'Following '+u.username+'!');}}>
                      {isFollowing?'Following ✓':'+ Follow'}
                    </button>
                  )}
                </div>
              );
            })}
          </div>}
      </div>
    </div>
  );
}

function FriendsPage({ state, dispatch, navigate, showToast }) {
  const [tab, setTab]               = useState('activity');
  const [query, setQuery]           = useState('');
  const [searchResults, setResults] = useState(null);
  const [searching, setSearching]   = useState(false);
  const searchTimer                 = useRef(null);

  const followingIds = useMemo(()=>(state.follows||[]).filter(f=>f.follower_id===state.currentUser.id).map(f=>f.following_id),[state.follows,state.currentUser.id]);
  const blockedIds   = useMemo(()=>(state.blocks||[]).map(b=>b.blocked_id),[state.blocks]);
  const allGames     = useMemo(()=>[...(state.apiGames||[]),...state.games],[state.apiGames,state.games]);

  // Full activity feed: reviews from people I follow, excluding blocked
  const feedItems = useMemo(()=>{
    if(!followingIds.length) return [];
    return (state.reviews||[])
      .filter(r=>followingIds.includes(r.userId)&&!blockedIds.includes(r.userId))
      .sort((a,b)=>new Date(b.date||0)-new Date(a.date||0))
      .slice(0,40)
      .map(r=>({...r,game:allGames.find(g=>g.id===r.gameId)}))
      .filter(r=>r.game);
  },[state.reviews,followingIds,blockedIds,allGames]);

  // Following list (people I follow)
  const followingList = useMemo(()=>
    (state.follows||[]).filter(f=>f.follower_id===state.currentUser.id)
      .map(f=>({id:f.following_id,username:f.following_username||f.following_id.slice(0,8)}))
  ,[state.follows,state.currentUser.id]);

  // Blocked list
  const blockedList = useMemo(()=>
    (state.blocks||[]).map(b=>({id:b.blocked_id,username:b.blocked_username||b.blocked_id.slice(0,8)}))
  ,[state.blocks]);

  const doSearch = useCallback(async(q)=>{
    if(!q.trim()){setResults(null);return;}
    setSearching(true);
    const {data}=await sb.from('profiles').select('id,username').ilike('username',`%${q.trim()}%`).neq('id',state.currentUser.id).limit(12);
    setResults(data||[]);
    setSearching(false);
  },[state.currentUser.id]);

  const onQueryChange = v => {
    setQuery(v);
    clearTimeout(searchTimer.current);
    searchTimer.current = setTimeout(()=>doSearch(v), 350);
  };

  const colors = ['#ff6b35','#4895ef','#47d98e','#e5383b','#00c3ff','#f0bf3d'];
  const ac = n => colors[(n||'').charCodeAt(0)%colors.length];
  const relTime = d => { if(!d)return''; const s=Math.floor((Date.now()-new Date(d))/1000); if(s<60)return'just now'; if(s<3600)return Math.floor(s/60)+'m ago'; if(s<86400)return Math.floor(s/3600)+'h ago'; return Math.floor(s/86400)+'d ago'; };

  // Pending incoming friend requests
  const pendingRequests = useMemo(()=>
    (state.friendRequests||[]).filter(r=>r.toUserId===state.currentUser.id&&r.status==='pending')
  ,[state.friendRequests,state.currentUser.id]);

  return (
    <div className="page">
      <div style={{padding:'16px 16px 0',fontSize:22,fontWeight:900}}>Friends</div>
      <div className="tab-bar" style={{margin:'10px 16px 0',borderBottom:'1px solid var(--border)',paddingBottom:0}}>
        {[['activity','Activity'],['people','People'],['requests','Requests']].map(([id,lbl])=>(
          <div key={id} className={`tab-item${tab===id?' active':''}`} onClick={()=>setTab(id)} style={{position:'relative'}}>
            {lbl}
            {id==='requests'&&pendingRequests.length>0&&<span style={{position:'absolute',top:6,right:4,width:16,height:16,borderRadius:8,background:'var(--accent)',color:'#000',fontSize:9,fontWeight:900,display:'flex',alignItems:'center',justifyContent:'center'}}>{pendingRequests.length}</span>}
          </div>
        ))}
      </div>

      {/* ── ACTIVITY TAB ── */}
      {tab==='activity'&&(
        <div className="page-scroll" style={{padding:'0 16px 24px'}}>
          {feedItems.length===0?(
            <div className="empty" style={{paddingTop:48}}>
              <div className="empty-icon">👥</div>
              <p>Follow people to see<br/>their reviews here</p>
              <button className="btn btn-primary btn-sm" style={{marginTop:14}} onClick={()=>setTab('people')}>Find People</button>
            </div>
          ):feedItems.map(r=>(
            <div key={r.id} style={{display:'flex',gap:12,padding:'14px 0',borderBottom:'1px solid var(--border)',cursor:'pointer'}} onClick={()=>navigate('game',{gameId:r.gameId})}>
              <div className="activity-avatar" style={{background:`${ac(r.user)}22`,color:ac(r.user),flexShrink:0,cursor:'pointer'}}
                onClick={e=>{e.stopPropagation();navigate('public_profile',{userId:r.userId,username:r.user});}}>
                {(r.user||'?').charAt(0).toUpperCase()}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:700,marginBottom:3}}>
                  <span style={{color:'var(--accent)',cursor:'pointer'}} onClick={e=>{e.stopPropagation();navigate('public_profile',{userId:r.userId,username:r.user});}}>{r.user}</span>
                  <span style={{color:'var(--text3)',fontWeight:400}}> reviewed </span>
                  <span>{r.game.away} vs {r.game.home}</span>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:r.text?4:0}}>
                  <Stars rating={r.rating} size={12}/>
                  <span style={{fontSize:11,color:'var(--text3)'}}>{getSportMeta(r.game.sport).emoji} {relTime(r.date)}</span>
                </div>
                {r.text&&<div style={{fontSize:12,color:'var(--text2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'100%'}}>{r.text}</div>}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* ── PEOPLE TAB ── */}
      {tab==='people'&&(
        <div className="page-scroll" style={{padding:'12px 16px 24px'}}>
          {/* Search bar */}
          <div style={{position:'relative',marginBottom:16}}>
            <input value={query} onChange={e=>onQueryChange(e.target.value)} placeholder="Search by username…"
              style={{width:'100%',paddingLeft:38,height:40,boxSizing:'border-box'}}/>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"
              style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'var(--text3)',pointerEvents:'none'}}>
              <circle cx="11" cy="11" r="7"/><line x1="19.5" y1="19.5" x2="15.5" y2="15.5"/>
            </svg>
          </div>

          {/* Search results */}
          {searchResults!==null&&(
            <div style={{marginBottom:20}}>
              <div className="t-micro" style={{marginBottom:4}}>Search Results</div>
              {searching&&<div className="spinner" style={{width:20,height:20,margin:'14px auto'}}/>}
              {!searching&&searchResults.length===0&&<div style={{fontSize:13,color:'var(--text3)',padding:'12px 0'}}>No users found for "{query}"</div>}
              {!searching&&searchResults.map(u=><UserRow key={u.id} user={u} state={state} dispatch={dispatch} navigate={navigate} showToast={showToast}/>)}
            </div>
          )}

          {/* Following list */}
          {!query&&followingList.length>0&&(
            <>
              <div className="t-micro" style={{marginBottom:4}}>Following · {followingList.length}</div>
              {followingList.map(u=><UserRow key={u.id} user={u} state={state} dispatch={dispatch} navigate={navigate} showToast={showToast}/>)}
            </>
          )}

          {/* Blocked list */}
          {!query&&blockedList.length>0&&(
            <div style={{marginTop:20}}>
              <div className="t-micro" style={{marginBottom:4}}>Blocked · {blockedList.length}</div>
              {blockedList.map(u=><UserRow key={u.id} user={u} state={state} dispatch={dispatch} navigate={navigate} showToast={showToast}/>)}
            </div>
          )}

          {/* Empty state */}
          {!query&&followingList.length===0&&(
            <div className="empty" style={{paddingTop:24}}>
              <div className="empty-icon">🔍</div>
              <p>Search for friends<br/>by username above</p>
            </div>
          )}
        </div>
      )}

      {/* ── REQUESTS TAB ── */}
      {tab==='requests'&&(
        <div className="page-scroll" style={{padding:'16px 16px 24px'}}>
          {pendingRequests.length===0?(
            <div className="empty" style={{paddingTop:48}}>
              <div className="empty-icon">🤝</div>
              <p>No pending friend requests</p>
            </div>
          ):pendingRequests.map(req=>(
            <RequestRow key={req.id} req={req} dispatch={dispatch} navigate={navigate} showToast={showToast} ac={ac} type="incoming"/>
          ))}
          {/* Sent requests */}
          {(state.friendRequests||[]).filter(r=>r.fromUserId===state.currentUser.id&&r.status==='pending').length>0&&(
            <div style={{marginTop:24}}>
              <div className="t-micro" style={{marginBottom:8}}>Sent Requests · {(state.friendRequests||[]).filter(r=>r.fromUserId===state.currentUser.id&&r.status==='pending').length}</div>
              {(state.friendRequests||[]).filter(r=>r.fromUserId===state.currentUser.id&&r.status==='pending').map(req=>(
                <RequestRow key={req.id} req={req} dispatch={dispatch} navigate={navigate} showToast={showToast} ac={ac} type="sent"/>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ── PROFILE PAGE ── */
function ProfilePage({ state, dispatch, navigate, showToast, onSignOut }) {
  const [tab,setTab]=useState('reviews');
  const [editing,setEditing]=useState(false);
  const [nameVal,setNameVal]=useState(state.currentUser.name);
  const [bioVal, setBioVal] = useState(state.profile?.bio||'');
  const [avatarVal, setAvatarVal] = useState(state.profile?.avatar_url||'');
  const [showCreateList,setShowCreateList]=useState(false);
  const [followModal,setFollowModal]=useState(null); // 'followers' | 'following'
  const [followerCount,setFollowerCount]=useState(null);
  useEffect(()=>{
    sb.from('follows').select('id',{count:'exact',head:true}).eq('following_id',state.currentUser.id)
      .then(({count})=>setFollowerCount(count||0));
  },[state.currentUser.id]);
  const myReviews=state.reviews.filter(r=>r.userId===state.currentUser.id);
  const allGames=[...state.games,...(state.apiGames||[])].filter((g,i,a)=>a.findIndex(x=>x.id===g.id)===i);
  const watchGames=allGames.filter(g=>state.watchlist.includes(g.id));
  const myLists=(state.lists||[]).filter(l=>l.userId===state.currentUser.id);
  const listItems=state.listItems||[];
  const avgMine=myReviews.length?(myReviews.reduce((a,b)=>a+b.rating,0)/myReviews.length).toFixed(1):'—';
  const followingCount=(state.follows||[]).filter(f=>f.follower_id===state.currentUser.id).length;
  const saveProfile=()=>{
    if(!nameVal.trim()) return;
    dispatch({type:'UPDATE_PROFILE',name:nameVal.trim(),bio:bioVal,avatarUrl:avatarVal});
    setEditing(false);
    showToast('✓ Profile updated');
  };
  return (
    <div className="page">
      <div className="profile-hd">
        <AvatarImg name={state.currentUser.name} url={state.profile?.avatar_url} size={72}/>
        {editing?(
          <div style={{maxWidth:300,margin:'12px auto 0',display:'flex',flexDirection:'column',gap:10}}>
            <input value={nameVal} onChange={e=>setNameVal(e.target.value)} placeholder="Username" style={{textAlign:'center',fontWeight:700}}/>
            <input value={avatarVal} onChange={e=>setAvatarVal(e.target.value)} placeholder="Avatar image URL (optional)" style={{fontSize:13,textAlign:'center'}}/>
            <textarea rows={2} value={bioVal} onChange={e=>setBioVal(e.target.value.slice(0,150))} placeholder="Bio (optional, 150 chars)" style={{fontSize:13,resize:'none'}}/>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-ghost btn-sm" style={{flex:1}} onClick={()=>setEditing(false)}>Cancel</button>
              <button className="btn btn-primary btn-sm" style={{flex:1}} onClick={saveProfile}>Save</button>
            </div>
          </div>
        ):(
          <>
            <div className="profile-name" style={{marginTop:10,marginBottom:2}}>{state.currentUser.name||'—'}</div>
            {state.profile?.bio&&<div style={{fontSize:13,color:'var(--text2)',textAlign:'center',margin:'2px 20px 0',lineHeight:1.4}}>{state.profile.bio}</div>}
            <button className="btn btn-ghost btn-sm" style={{margin:'10px auto 0',display:'flex'}} onClick={()=>{setNameVal(state.currentUser.name);setBioVal(state.profile?.bio||'');setAvatarVal(state.profile?.avatar_url||'');setEditing(true);}}>✏️ Edit Profile</button>
          </>
        )}
        <div className="profile-stats" style={{marginTop:14}}>
          <div><div className="stat-num">{myReviews.length}</div><div className="stat-lbl">Reviews</div></div>
          <div style={{cursor:'pointer'}} onClick={()=>setFollowModal('followers')}><div className="stat-num" style={{color:'var(--accent)'}}>{followerCount===null?'—':followerCount}</div><div className="stat-lbl">Followers</div></div>
          <div style={{cursor:'pointer'}} onClick={()=>setFollowModal('following')}><div className="stat-num" style={{color:'var(--accent)'}}>{followingCount}</div><div className="stat-lbl">Following</div></div>
          <div><div className="stat-num">{avgMine}</div><div className="stat-lbl">Avg ★</div></div>
        </div>
        <button className="btn btn-ghost btn-sm profile-signout" style={{margin:'8px auto 16px',display:'flex'}} onClick={onSignOut}>Sign Out</button>

/* ── CREATE LIST MODAL ── */
function CreateListModal({ onClose, onSave, initial }) {
  const [name,setName]=useState(initial?.name||'');
  const [desc,setDesc]=useState(initial?.description||'');
  const [saving,setSaving]=useState(false);
  const submit=async()=>{
    if(!name.trim())return;
    setSaving(true);
    await onSave({name:name.trim(),description:desc.trim()});
    setSaving(false);
  };
  return (
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>

}

/* ── ADD TO LIST MODAL ── */
function AddToListModal({ gameId, state, dispatch, showToast, onClose }) {
  const [showCreate,setShowCreate]=useState(false);
  const [adding,setAdding]=useState(null);
  const myLists=(state.lists||[]).filter(l=>l.userId===state.currentUser.id);
  const listItems=state.listItems||[];

  const addToList=async(listId)=>{
    if(listItems.some(li=>li.listId===listId&&li.gameId===gameId)){showToast('Already in that list');return;}
    setAdding(listId);
    const ok=await dispatch({type:'ADD_TO_LIST',listId,gameId});
    setAdding(null);
    if(ok===true){showToast('✓ Added to list!');onClose();}
    else showToast('❌ Could not add — check your connection');
  };

  const createAndAdd=async({name,description})=>{
    const list=await dispatch({type:'CREATE_LIST',name,description});
    if(list&&list.id){
      await dispatch({type:'ADD_TO_LIST',listId:list.id,gameId});
      showToast('✓ List created & game added!');
      onClose();
    } else {
      showToast('❌ Could not create list');
    }
    setShowCreate(false);
  };

  if(showCreate) return <CreateListModal onClose={()=>setShowCreate(false)} onSave={createAndAdd}/>;

  return (
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="sheet">
        <div className="sheet-handle"/>
        <div style={{fontSize:17,fontWeight:800,marginBottom:14}}>Add to List</div>
        <button className="btn btn-ghost btn-full" style={{marginBottom:14,justifyContent:'center'}} onClick={()=>setShowCreate(true)}>
          + Create new list
        </button>
        {myLists.length===0?(
          <div className="empty" style={{paddingBottom:24}}><p>Create a list above to get started!</p></div>
        ):myLists.map(list=>{
          const isIn=listItems.some(li=>li.listId===list.id&&li.gameId===gameId);
          const cnt=listItems.filter(li=>li.listId===list.id).length;
          return(
            <div key={list.id} onClick={()=>!isIn&&!adding&&addToList(list.id)}
              style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 4px',borderBottom:'1px solid var(--border)',cursor:isIn||adding?'default':'pointer',opacity:adding===list.id?0.5:1}}>
              <div>
                <div style={{fontWeight:700,fontSize:14}}>{list.name}</div>
                <div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>{cnt} game{cnt!==1?'s':''}</div>
              </div>
              {isIn?<span style={{color:'var(--green)',fontSize:13,fontWeight:700}}>✓ Added</span>
                :<span style={{color:'var(--accent)',fontSize:13,fontWeight:700}}>Add</span>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function OnboardingFlow({ onDone }) {
  const [step, setStep]   = useState(0);
  const [dir,  setDir]    = useState(1); // 1=forward, -1=back
  const [key,  setKey]    = useState(0);
  const touchX = useRef(null);
  const slide  = OB_SLIDES[step];
  const isLast = step === OB_SLIDES.length - 1;

  const go = (next) => {
    if(next < 0 || next >= OB_SLIDES.length) return;
    setDir(next > step ? 1 : -1);
    setStep(next);
    setKey(k => k+1);
  };
  const finish = () => { localStorage.setItem('bs-onboarded','1'); onDone(); };
  const onTouchStart = e => { touchX.current = e.touches[0].clientX; };
  const onTouchEnd   = e => {
    if(touchX.current===null) return;
    const dx = touchX.current - e.changedTouches[0].clientX;
    touchX.current = null;
    if(dx >  50) { if(!isLast) go(step+1); else finish(); }
    if(dx < -50) { go(step-1); }
  };

  return (
    <div style={{position:'fixed',inset:0,zIndex:1000,background:'#000',display:'flex',flexDirection:'column',touchAction:'pan-y'}}
         onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>

      {/* Top bar */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 20px 0',flexShrink:0}}>

          <button onClick={finish} style={{background:'none',border:'none',color:'var(--text3)',fontSize:14,fontWeight:600,cursor:'pointer',padding:'6px 10px',borderRadius:8}}>
            Skip
          </button>
        )}
      </div>

      {/* Slide */}
      <div key={key} className={dir>=0?'ob-slide':'ob-slide-back'}
           style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'12px 28px 8px',textAlign:'center',overflow:'hidden'}}>

        {/* Emoji */}
        <div style={{fontSize:96,lineHeight:1,marginBottom:20,filter:`drop-shadow(0 0 40px ${slide.color}55)`}}>
          {slide.emoji}
        </div>

        {/* Label pill */}
        <div style={{display:'inline-flex',alignItems:'center',gap:6,background:`${slide.color}18`,border:`1px solid ${slide.color}44`,borderRadius:20,padding:'4px 14px',fontSize:11,fontWeight:800,letterSpacing:1.4,textTransform:'uppercase',color:slide.color,marginBottom:14}}>
          {slide.label}
        </div>

        {/* Title */}
        <div style={{fontSize:30,fontWeight:900,letterSpacing:-0.5,color:'var(--text)',marginBottom:12,lineHeight:1.2,whiteSpace:'pre-line'}}>
          {slide.title}
        </div>

        {/* Description */}
        {slide.desc && (
          <div style={{fontSize:15,color:'var(--text2)',lineHeight:1.65,maxWidth:310,marginBottom:20}}>
            {slide.desc}
          </div>
        )}

        {/* Tips */}
        {slide.tips && (
          <div style={{display:'flex',flexDirection:'column',gap:9,width:'100%',maxWidth:340,marginTop:slide.desc?0:4}}>
            {slide.tips.map((t,i) => (
              <div key={i} className="ob-tip">
                <span className="ob-tip-icon">{t.icon}</span>
                <span>{t.text}</span>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Footer */}
      <div style={{flexShrink:0,padding:'0 24px',paddingBottom:'max(28px,env(safe-area-inset-bottom,0px))'}}>

        {/* Step dots */}
        <div style={{display:'flex',justifyContent:'center',alignItems:'center',gap:7,marginBottom:16}}>
          {OB_SLIDES.map((_,i) => (
            <div key={i} onClick={()=>go(i)}
                 style={{height:7,borderRadius:4,cursor:'pointer',transition:'all 0.3s ease',
                   width: i===step ? 28 : 7,
                   background: i===step ? slide.color : 'var(--s3)',
                   opacity: i<step ? 0.5 : 1,
                 }}/>
          ))}
        </div>

        {/* CTA */}
        <button className="btn btn-primary btn-full"
                style={{background:slide.color,color: slide.color==='#f0bf3d'?'#000':'#fff',fontSize:17,padding:'16px',borderRadius:16,fontWeight:800,transition:'background 0.3s'}}
                onClick={isLast ? finish : ()=>go(step+1)}>
          {isLast ? 'Start Exploring 🚀' : 'Next →'}
        </button>

        {/* Back link on non-first non-last */}
        {step > 0 && !isLast && (
          <div style={{textAlign:'center',marginTop:12,fontSize:13,color:'var(--text3)',cursor:'pointer'}} onClick={()=>go(step-1)}>
            ← Back
          </div>
        )}
      </div>
    </div>
  );
}

/* ── PWA INSTALL BANNER ── */
function InstallBanner() {
  const [prompt, setPrompt] = useState(null);
  const [show, setShow] = useState(false);
  const [isIOS, setIsIOS] = useState(false);
  const [dismissed, setDismissed] = useState(()=>!!localStorage.getItem('bs-install-dismissed'));

  useEffect(()=>{
    // Detect iOS (iPhone/iPad) that isn't already installed as PWA
    const ios = /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.navigator.standalone;
    setIsIOS(ios);
    if(ios && !dismissed) setShow(true);

    // Android / Desktop install prompt
    const handler = e => {
      e.preventDefault();
      setPrompt(e);
      if(!dismissed) setShow(true);
    };
    window.addEventListener('beforeinstallprompt', handler);
    return () => window.removeEventListener('beforeinstallprompt', handler);
  }, [dismissed]);

  const install = async () => {
    if(prompt){ prompt.prompt(); const {outcome}=await prompt.userChoice; if(outcome==='accepted') setShow(false); }
    dismiss();
  };
  const dismiss = () => { localStorage.setItem('bs-install-dismissed','1'); setShow(false); };

  if(!show || dismissed) return null;

  return (
    <div style={{position:'fixed',bottom:80,left:16,right:16,zIndex:999,background:'#1c1c24',border:'1.5px solid rgba(240,191,61,0.4)',borderRadius:16,padding:'14px 16px',display:'flex',alignItems:'flex-start',gap:12,boxShadow:'0 8px 32px rgba(0,0,0,0.6)'}}>
      <div style={{fontSize:28,lineHeight:1,flexShrink:0}}>⚡</div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontWeight:800,fontSize:14,color:'var(--text)',marginBottom:3}}>Add BoxScore to Home Screen</div>
        {isIOS
          ? <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.4}}>Tap the <strong>Share</strong> button then <strong>"Add to Home Screen"</strong></div>
          : <div style={{fontSize:12,color:'var(--text2)'}}>Install for the full app experience</div>
        }
        {!isIOS && <button className="btn btn-primary btn-sm" style={{marginTop:8}} onClick={install}>Install</button>}
      </div>
      <button onClick={dismiss} style={{background:'none',border:'none',color:'var(--text3)',fontSize:18,lineHeight:1,padding:'0 2px',flexShrink:0}}>✕</button>
    </div>
  );
}

/* ── PULL TO REFRESH ── */
function PullToRefresh({children}){
  const [pullY,setPullY]=useState(0);
  const [stage,setStage]=useState('idle'); // idle | pulling | ready | refreshing
  const containerRef=useRef(null);
  const startYRef=useRef(0);
  const activeRef=useRef(false);
  const pullYRef=useRef(0);
  const THRESHOLD=70;

  useEffect(()=>{
    const el=containerRef.current;
    if(!el)return;
    const getScrollTop=()=>{
      const page=el.querySelector('.page');
      return page?page.scrollTop:0;
    };
    const onStart=(e)=>{
      if(getScrollTop()>5)return;
      startYRef.current=e.touches[0].clientY;
      activeRef.current=true;
    };
    const onMove=(e)=>{
      if(!activeRef.current)return;
      const dy=e.touches[0].clientY-startYRef.current;
      if(dy<=0||getScrollTop()>5){
        activeRef.current=false;
        pullYRef.current=0;
        setPullY(0);setStage('idle');return;
      }
      const pull=Math.min(THRESHOLD*1.5,dy*0.45);
      pullYRef.current=pull;
      setPullY(pull);
      setStage(pull>=THRESHOLD?'ready':'pulling');
    };
    const onEnd=()=>{
      if(!activeRef.current)return;
      activeRef.current=false;
      if(pullYRef.current>=THRESHOLD){
        setStage('refreshing');
        setPullY(THRESHOLD);
        setTimeout(()=>window.location.reload(true),400);
      } else {
        setPullY(0);setStage('idle');
      }
    };
    el.addEventListener('touchstart',onStart,{passive:true});
    el.addEventListener('touchmove',onMove,{passive:true});
    el.addEventListener('touchend',onEnd);
    return()=>{
      el.removeEventListener('touchstart',onStart);
      el.removeEventListener('touchmove',onMove);
      el.removeEventListener('touchend',onEnd);
    };
  },[]);

  const indicatorH=Math.max(0,pullY);
  const isMoving=pullY>0;
  return(
    <div ref={containerRef} style={{height:'100%',position:'relative',overflow:'hidden'}}>
      {/* Pull indicator */}
      <div style={{
        position:'absolute',top:0,left:0,right:0,
        height:indicatorH,
        background:'var(--bg)',
        display:'flex',alignItems:'flex-end',justifyContent:'center',
        paddingBottom:8,zIndex:20,overflow:'hidden',
        transition:isMoving?'none':'height 0.25s ease'
      }}>
        {pullY>24&&(
          <div style={{display:'flex',alignItems:'center',gap:6,color:'var(--text3)',fontSize:12,fontWeight:700}}>
            {stage==='refreshing'
              ?<><div className="spinner" style={{width:16,height:16,borderWidth:2}}/> Refreshing…</>
              :stage==='ready'
              ?<span style={{color:'var(--accent)'}}>↑ Release to refresh</span>
              :<span>↓ Pull to refresh</span>
            }
          </div>
        )}
      </div>
      {/* Page content pushed down while pulling */}
      <div style={{
        height:'100%',
        transform:`translateY(${pullY}px)`,
        transition:isMoving?'none':'transform 0.25s ease'
      }}>
        {children}
      </div>
    </div>
  );
}

/* ── ROOT APP ── */
function App() {
  const [session,  setSession]   = useState(null);

  const [games,    setGames]     = useState([]);
  const [reviews,  setReviews]   = useState([]);
  const [likes,    setLikes]     = useState([]);
  const [watchlist,setWatchlist] = useState([]);
  const [follows,   setFollows]   = useState([]);
  const [blocks,    setBlocks]    = useState([]);
  const [notifications, setNotifications] = useState([]);
  const [lists,          setLists]          = useState([]);
  const [listItems,      setListItems]      = useState([]);
  const [friendRequests, setFriendRequests] = useState([]);
  const [loading,  setLoading]   = useState(true);
  const [apiGames, setApiGames]  = useState([]);
  const [apiLoading, setApiLoading] = useState(false);
  const [route,    setRoute]     = useState({page:'home',params:{}});
  const [toast,    setToast]     = useState(null);
  const [addGame,  setAddGame]   = useState(false);
  const [showOnboarding, setShowOnboarding] = useState(false);
  const toastTimer = useRef(null);

  const fetchApiGames = useCallback(async()=>{
    setApiLoading(true);
    const sports=['nba','nfl','mlb','nhl','mls','epl'];
    // Fetch last 14 days per sport, 10 most recent games each
    const results = await Promise.all(sports.map(s=>fetchRecentLeagueGames(s,10,14)));
    const all = results.flat().sort((a,b)=>{
      // Live first, then by date descending
      const o={in:0,post:1,pre:2};
      const statusDiff=(o[a.status]||1)-(o[b.status]||1);
      if(statusDiff!==0)return statusDiff;
      return new Date(b.datetime||b.date)-new Date(a.datetime||a.date);
    });
    setApiGames(all);
    setApiLoading(false);
  },[]);

  // Lighter refresh every 60s: just today's live scores
  const refreshLive = useCallback(async()=>{
    const sports=['nba','nfl','mlb','nhl','mls','epl'];
    const results = await Promise.all(sports.map(fetchLeagueGames));
    const today = results.flat();
    if(!today.length)return;
    setApiGames(prev=>{
      const todayIds=new Set(today.map(g=>g.id));
      // Replace today's games, keep historical
      return [...today,...prev.filter(g=>!todayIds.has(g.id)&&g.status!=='in')]
        .sort((a,b)=>{const o={in:0,post:1,pre:2};const d=(o[a.status]||1)-(o[b.status]||1);return d!==0?d:new Date(b.datetime||b.date)-new Date(a.datetime||a.date);});
    });
  },[]);

  useEffect(()=>{
    if(!session) return;
    fetchApiGames(); // full 14-day fetch on load
    const id=setInterval(refreshLive,60000); // light live-score refresh every 60s
    return()=>clearInterval(id);
  },[session,fetchApiGames,refreshLive]);

    const navigate = (page,params={}) => setRoute({page,params});
  const showToast = useCallback(msg=>{ setToast(msg); clearTimeout(toastTimer.current); toastTimer.current=setTimeout(()=>setToast(null),2300); },[]);

  const loadData = useCallback(async(userId, userMeta={})=>{
    try {
      const [gR,rR,lR,wR,pR,fR,bR,nR] = await Promise.all([
        sb.from('games').select('*').order('date',{ascending:false}),
        sb.from('reviews').select('*').order('created_at',{ascending:false}),
        sb.from('likes').select('*'),
        sb.from('watchlist').select('game_id').eq('user_id',userId),
        sb.from('profiles').select('*').eq('id',userId).single(),
        sb.from('follows').select('*').eq('follower_id',userId),
        sb.from('blocks').select('*').eq('blocker_id',userId),
        sb.from('notifications').select('*').eq('user_id',userId).order('created_at',{ascending:false}).limit(30),
      ]);
      const loadedGames = (gR.data||[]).map(normalizeGame);
      setGames(loadedGames);
      setReviews((rR.data||[]).map(normalizeReview));
      setLikes(lR.data||[]);
      setWatchlist((wR.data||[]).map(w=>w.game_id));
      // Ensure profile row exists — create from auth metadata if missing
      let profileRow = pR.data;
      if(!profileRow){
        const username = userMeta.username || `fan_${userId.slice(-4)}`;
        const {data:np} = await sb.from('profiles')
          .upsert({id:userId, username, fav_sport:userMeta.fav_sport||'nba'},{onConflict:'id'})
          .select().single();
        profileRow = np || {id:userId, username, fav_sport:userMeta.fav_sport||'nba'};
      }
      setProfile(profileRow);
      setNotifications((nR.data||[]).map(normalizeNotif));
      // Recover any games referenced by reviews but not yet in the games table
      const loadedIds = new Set(loadedGames.map(g=>g.id));
      const missingIds = [...new Set((rR.data||[]).map(r=>r.game_id))].filter(id=>!loadedIds.has(id));
      if(missingIds.length){
        const {data:mg}=await sb.from('games').select('*').in('id',missingIds);
        if(mg?.length) setGames(prev=>[...prev,...mg.map(normalizeGame).filter(g=>!prev.find(p=>p.id===g.id))]);
      }
      // Enrich follows + blocks with usernames
      const followData = fR.data||[], blockData = bR.data||[];
      const extraIds = [...new Set([...followData.map(f=>f.following_id),...blockData.map(b=>b.blocked_id)])];
      let pMap = {};
      if(extraIds.length){ const {data:pd}=await sb.from('profiles').select('id,username').in('id',extraIds); (pd||[]).forEach(p=>{pMap[p.id]=p.username;}); }
      setFollows(followData.map(f=>({...f,following_username:pMap[f.following_id]||''})));
      setBlocks(blockData.map(b=>({...b,blocked_username:pMap[b.blocked_id]||''})));
      // Load user's lists and their game items
      const {data:listsData} = await sb.from('lists').select('*').eq('user_id',userId).order('created_at',{ascending:false});
      const myLists = listsData||[];
      setLists(myLists.map(normalizeList));
      if(myLists.length>0){
        const {data:itemsData} = await sb.from('list_items').select('*').in('list_id',myLists.map(l=>l.id));
        setListItems((itemsData||[]).map(normalizeListItem));
      }
      // Load friend requests (sent and received)
      const {data:frData} = await sb.from('friend_requests').select('*')
        .or(`from_user_id.eq.${userId},to_user_id.eq.${userId}`)
        .order('created_at',{ascending:false});
      setFriendRequests((frData||[]).map(normalizeRequest));
    } catch(e){ console.error('loadData error',e); }
    setLoading(false);
  },[]);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{ setSession(session); if(session)loadData(session.user.id, session.user.user_metadata||{}); else setLoading(false); });
    const {data:{subscription}}=sb.auth.onAuthStateChange((_e,session)=>{ setSession(session); if(!session){setGames([]);setReviews([]);setLikes([]);setWatchlist([]);setFollows([]);setBlocks([]);setProfile(null);setNotifications([]);} });
    return()=>subscription.unsubscribe();
  },[]);

  // Build state object compatible with all existing components
  const state = useMemo(()=>({
    games,
    apiGames,
    apiLoading,
    reviews: reviews.map(r=>({...r, likes: likes.filter(l=>l.review_id===r.id).map(l=>l.user_id)})),
    watchlist,
    follows,
    blocks,
    notifications,
    lists,
    listItems,
    friendRequests,
    profile,
    currentUser: { id: session?.user?.id||'', name: profile?.username||'' },
  }),[games,reviews,likes,watchlist,follows,blocks,notifications,lists,listItems,friendRequests,session,profile]);

  const ensureGameInDb = async(g, uid) => {
    // Only columns that actually exist in the games table schema
    const row = {
      id:g.id, sport:g.sport, league:g.league||g.sport,
      home:g.home, away:g.away,
      home_score:g.homeScore??null, away_score:g.awayScore??null,
      date:g.date||'', venue:g.venue||'', description:g.description||'',
      video_url:'', tags:g.tags||[], created_by:uid
    };
    const {error} = await sb.from('games').upsert(row,{onConflict:'id'});
    if(error){console.error('[ensureGameInDb] error',error);return {ok:false,error:error.message||error.code||String(error)};}
    return {ok:true};
  };

  const dispatch = useCallback(async(action)=>{
    const uid = session?.user?.id;
    if(!uid) return false;
    try {
    switch(action.type){
      case 'ADD_REVIEW': {
        const r=action.review, g=action.game;
        const uname = profile?.username || session?.user?.user_metadata?.username || `fan_${uid.slice(-4)}`;
        if(g?.fromApi){const gr=await ensureGameInDb(g,uid);if(gr&&!gr.ok)return {ok:false,error:`Game save failed: ${gr.error}`};}
        // Check for existing review first (avoids relying on a unique constraint)
        console.log('[ADD_REVIEW] gameId=',r.gameId,'uid=',uid,'uname=',uname,'gameFromApi=',g?.fromApi);
        if(!r.gameId){console.error('[ADD_REVIEW] missing gameId');return {ok:false,error:'Missing game ID'};}
        const {data:existing,error:selectErr} = await sb.from('reviews').select('id').eq('game_id',r.gameId).eq('user_id',uid).maybeSingle();
        if(selectErr) console.warn('[ADD_REVIEW] select error',selectErr);
        let saveErr;
        if(existing?.id){
          console.log('[ADD_REVIEW] updating existing review',existing.id);
          const {error} = await sb.from('reviews').update({username:uname,rating:r.rating,body:r.text,video_url:r.videoUrl||''}).eq('id',existing.id);
          saveErr=error;
        } else {
          console.log('[ADD_REVIEW] inserting new review');
          const {error} = await sb.from('reviews').insert({game_id:r.gameId,user_id:uid,username:uname,rating:r.rating,body:r.text,video_url:r.videoUrl||''});
          saveErr=error;
        }
        if(saveErr){console.error('[ADD_REVIEW] save error',saveErr);return {ok:false,error:saveErr.message||saveErr.code||String(saveErr)};}
        // Re-fetch user's reviews from DB so state always reflects reality
        const {data:fresh} = await sb.from('reviews').select('*').eq('user_id',uid).order('created_at',{ascending:false});
        if(fresh) setReviews(prev=>{const others=prev.filter(x=>x.userId!==uid);return[...(fresh.map(normalizeReview)),...others];});
        if(g?.fromApi) setGames(prev=>prev.find(x=>x.id===g.id)?prev:[...prev,g]);
        return true;
      }
      case 'DELETE_REVIEW': {
        await sb.from('reviews').delete().eq('id',action.reviewId).eq('user_id',uid);
        setReviews(prev=>prev.filter(r=>r.id!==action.reviewId));
        break;
      }
      case 'TOGGLE_LIKE': {
        const isLiked=likes.some(l=>l.review_id===action.reviewId&&l.user_id===uid);
        if(isLiked){ await sb.from('likes').delete().match({review_id:action.reviewId,user_id:uid}); setLikes(prev=>prev.filter(l=>!(l.review_id===action.reviewId&&l.user_id===uid))); }
        else {
          const like={review_id:action.reviewId,user_id:uid}; await sb.from('likes').insert(like); setLikes(prev=>[...prev,like]);
          const review=reviews.find(r=>r.id===action.reviewId);
          if(review&&review.userId!==uid){
            const notifRow={user_id:review.userId,type:'like',from_user_id:uid,from_username:profile?.username||'',game_id:review.gameId,review_id:action.reviewId};
            const {data:nd}=await sb.from('notifications').insert(notifRow).select().single();
            if(nd) setNotifications(prev=>[normalizeNotif(nd),...prev]);
          }
        }
        break;
      }
      case 'ADD_WATCHLIST': { const wg=(state.apiGames||[]).find(g=>g.id===action.gameId); if(wg?.fromApi)await ensureGameInDb(wg,uid); await sb.from('watchlist').insert({game_id:action.gameId,user_id:uid}); setWatchlist(prev=>[...prev,action.gameId]); break; }
      case 'REMOVE_WATCHLIST': { await sb.from('watchlist').delete().match({game_id:action.gameId,user_id:uid}); setWatchlist(prev=>prev.filter(id=>id!==action.gameId)); break; }
      case 'FOLLOW': {
        await sb.from('follows').insert({follower_id:uid,following_id:action.userId});
        setFollows(prev=>[...prev,{follower_id:uid,following_id:action.userId,following_username:action.username||''}]);
        if(action.userId!==uid){
          const notifRow={user_id:action.userId,type:'follow',from_user_id:uid,from_username:profile?.username||''};
          await sb.from('notifications').insert(notifRow);
        }
        break;
      }
      case 'UNFOLLOW': { await sb.from('follows').delete().match({follower_id:uid,following_id:action.userId}); setFollows(prev=>prev.filter(f=>!(f.follower_id===uid&&f.following_id===action.userId))); break; }
      case 'BLOCK': {
        await sb.from('blocks').insert({blocker_id:uid,blocked_id:action.userId});
        await sb.from('follows').delete().match({follower_id:uid,following_id:action.userId});
        setBlocks(prev=>[...prev,{blocker_id:uid,blocked_id:action.userId,blocked_username:action.username||''}]);
        setFollows(prev=>prev.filter(f=>f.following_id!==action.userId));
        break;
      }
      case 'UNBLOCK': {
        await sb.from('blocks').delete().match({blocker_id:uid,blocked_id:action.userId});
        setBlocks(prev=>prev.filter(b=>b.blocked_id!==action.userId));
        break;
      }
      case 'ADD_GAME': {
        const g=action.game;
        const {data,error}=await sb.from('games').insert({id:g.id,sport:g.sport,league:g.league||g.sport,home:g.home,away:g.away,home_score:g.homeScore,away_score:g.awayScore,date:g.date,venue:g.venue||'',description:g.description||'',video_url:g.videoUrl||'',tags:g.tags||[],created_by:uid}).select().single();
        if(!error&&data) setGames(prev=>[normalizeGame(data),...prev]);
        break;
      }
      case 'UPSERT_API_GAME': {
        const g=action.game, id='api_'+g.apiId;
        const {data}=await sb.from('games').upsert({id,sport:g.sport,league:g.league||g.sport,home:g.home,away:g.away,home_score:g.homeScore??null,away_score:g.awayScore??null,date:g.date,venue:g.venue||'',description:'',video_url:'',tags:[],api_id:g.apiId,home_team_id:g.homeTeamId||null,away_team_id:g.awayTeamId||null,series_info:g.seriesInfo||null,series_type:g.seriesType||null,home_series_wins:g.homeSeriesWins??null,away_series_wins:g.awaySeriesWins??null,is_playoff:g.isPlayoff||false,created_by:uid},{onConflict:'id'}).select().single();
        const norm=data?{...normalizeGame(data),...g,id}:{...g,id,league:g.league||g.sport};
        setGames(prev=>{const ex=prev.find(x=>x.id===id);return ex?prev.map(x=>x.id===id?{...x,...norm}:x):[norm,...prev];});
        break;
      }
      case 'UPDATE_GAME_SERIES': {
        const {gameId,awaySeriesWins,homeSeriesWins,seriesType,isPlayoff}=action;
        // Update local state immediately (optimistic)
        setGames(prev=>prev.map(g=>g.id===gameId?{...g,awaySeriesWins,homeSeriesWins,seriesType,isPlayoff,seriesInfo:awaySeriesWins!==null?`Series: ${awaySeriesWins}–${homeSeriesWins}`:''}:g));
        // Persist to Supabase if it's a DB game
        await sb.from('games').update({away_series_wins:awaySeriesWins,home_series_wins:homeSeriesWins,series_type:seriesType||null,is_playoff:isPlayoff,series_info:awaySeriesWins!==null?`${awaySeriesWins}–${homeSeriesWins}`:null}).eq('id',gameId);
        // Also update apiGames state to reflect immediately
        setApiGames(prev=>prev.map(g=>g.id===gameId?{...g,awaySeriesWins,homeSeriesWins,seriesType,isPlayoff}:g));
        break;
      }
      case 'SET_USER_NAME': { await sb.from('profiles').update({username:action.name}).eq('id',uid); setProfile(prev=>({...prev,username:action.name})); break; }
      case 'UPDATE_PROFILE': {
        const updates = {};
        if(action.name) updates.username = action.name;
        if(action.bio!==undefined) updates.bio = action.bio;
        if(action.avatarUrl!==undefined) updates.avatar_url = action.avatarUrl;
        if(Object.keys(updates).length){
          await sb.from('profiles').update(updates).eq('id',uid);
          setProfile(prev=>({...prev,...updates}));
        }
        break;
      }
      case 'SEND_FRIEND_REQUEST': {
        const toId=action.userId, toUname=action.username||'';
        const myUname=profile?.username||`fan_${uid.slice(-4)}`;
        // Check no existing request
        const existing=(friendRequests||[]).find(r=>(r.fromUserId===uid&&r.toUserId===toId)||(r.fromUserId===toId&&r.toUserId===uid));
        if(existing) return {ok:false,error:'Request already exists'};
        const {data,error}=await sb.from('friend_requests').insert({from_user_id:uid,to_user_id:toId,from_username:myUname,to_username:toUname,status:'pending'}).select().single();
        if(error){console.error('SEND_FRIEND_REQUEST error',error);return {ok:false,error:error.message};}
        setFriendRequests(prev=>[normalizeRequest(data),...prev]);
        // Notify the recipient
        await sb.from('notifications').insert({user_id:toId,type:'friend_request',from_user_id:uid,from_username:myUname});
        return {ok:true};
      }
      case 'ACCEPT_FRIEND_REQUEST': {
        const reqId=action.requestId;
        const req=(friendRequests||[]).find(r=>r.id===reqId);
        if(!req) return {ok:false};
        const {error}=await sb.from('friend_requests').update({status:'accepted'}).eq('id',reqId);
        if(error) return {ok:false,error:error.message};
        setFriendRequests(prev=>prev.map(r=>r.id===reqId?{...r,status:'accepted'}:r));
        // Mutual follow
        const myUname=profile?.username||`fan_${uid.slice(-4)}`;
        await Promise.all([
          sb.from('follows').upsert({follower_id:uid,following_id:req.fromUserId},{onConflict:'follower_id,following_id'}),
          sb.from('follows').upsert({follower_id:req.fromUserId,following_id:uid},{onConflict:'follower_id,following_id'}),
        ]);
        setFollows(prev=>{const already=prev.some(f=>f.follower_id===uid&&f.following_id===req.fromUserId);return already?prev:[...prev,{follower_id:uid,following_id:req.fromUserId,following_username:req.fromUsername}];});
        // Notify the requester
        await sb.from('notifications').insert({user_id:req.fromUserId,type:'friend_accepted',from_user_id:uid,from_username:myUname});
        return {ok:true};
      }
      case 'DECLINE_FRIEND_REQUEST': {
        const reqId=action.requestId;
        await sb.from('friend_requests').delete().eq('id',reqId);
        setFriendRequests(prev=>prev.filter(r=>r.id!==reqId));
        return {ok:true};
      }
      case 'CANCEL_FRIEND_REQUEST': {
        const reqId=action.requestId;
        await sb.from('friend_requests').delete().eq('id',reqId).eq('from_user_id',uid);
        setFriendRequests(prev=>prev.filter(r=>r.id!==reqId));
        return {ok:true};
      }
      case 'MARK_NOTIFS_READ': {
        await sb.from('notifications').update({read:true}).eq('user_id',uid).eq('read',false);
        setNotifications(prev=>prev.map(n=>({...n,read:true})));
        break;
      }
      case 'CREATE_LIST': {
        const uname = profile?.username || session?.user?.user_metadata?.username || `fan_${uid.slice(-4)}`;
        const {data,error} = await sb.from('lists').insert({user_id:uid,username:uname,name:action.name,description:action.description||'',is_public:action.isPublic!==false}).select().single();
        if(error){console.error('CREATE_LIST error',error);return false;}
        const newList = normalizeList(data);
        setLists(prev=>[newList,...prev]);
        return newList;
      }
      case 'DELETE_LIST': {
        await sb.from('lists').delete().eq('id',action.listId).eq('user_id',uid);
        setLists(prev=>prev.filter(l=>l.id!==action.listId));
        setListItems(prev=>prev.filter(li=>li.listId!==action.listId));
        break;
      }
      case 'ADD_TO_LIST': {
        // Ensure API games exist in DB first
        const g = [...(state.games||[]),...(state.apiGames||[])].find(x=>x.id===action.gameId);
        if(g?.fromApi) await ensureGameInDb(g,uid);
        const {error} = await sb.from('list_items').insert({list_id:action.listId,game_id:action.gameId,position:0});
        if(error){console.error('ADD_TO_LIST error',error);return false;}
        const {data:fresh} = await sb.from('list_items').select('*').eq('list_id',action.listId);
        if(fresh) setListItems(prev=>[...prev.filter(li=>li.listId!==action.listId),...fresh.map(normalizeListItem)]);
        return true;
      }
      case 'REMOVE_FROM_LIST': {
        await sb.from('list_items').delete().eq('list_id',action.listId).eq('game_id',action.gameId);
        setListItems(prev=>prev.filter(li=>!(li.listId===action.listId&&li.gameId===action.gameId)));
        break;
      }
      case 'UPDATE_LIST': {
        const {error} = await sb.from('lists').update({name:action.name,description:action.description||''}).eq('id',action.listId).eq('user_id',uid);
        if(!error) setLists(prev=>prev.map(l=>l.id===action.listId?{...l,name:action.name,description:action.description||''}:l));
        break;
      }
    }
    } catch(e){ console.error('dispatch error',action.type,e); return false; }
  },[session,profile,likes,reviews,notifications,lists,listItems,state]);

  /* Loading screen */
  if(loading) return (
    <div className="auth-screen">
      <BoxscoreLogo fontSize={32}/>
      <div className="spinner"/>
    </div>
  );

  /* Auth screen */
  if(!session) return <AuthPage onAuth={async(sess, isNew)=>{
    setSession(sess);
    await loadData(sess.user.id, sess.user.user_metadata||{});
    if(isNew || !localStorage.getItem('bs-onboarded')) {
      setShowOnboarding(true);
    } else {
      showToast('Welcome back! 🎉');
    }
  }}/>;

  const activePage=(route.page==='game'||route.page==='list')?null:route.page;
  const NAV=[{id:'home',label:'Home',Icon:IconHome},{id:'search',label:'Search',Icon:IconSearch},{id:'add',label:'',isAdd:true},{id:'friends',label:'Friends',Icon:IconPeople},{id:'profile',label:'Profile',Icon:IconPerson}];

  const unreadCount=(state.notifications||[]).filter(n=>!n.read).length;
  const pendingFR=(state.friendRequests||[]).filter(r=>r.toUserId===state.currentUser.id&&r.status==='pending').length;
  const badge=pendingFR+unreadCount;

  return (
    <div className="app-root">
      {/* ── Mobile only: status-bar spacer ── */}
      <div className="status-bar-spacer" style={{flexShrink:0,background:'var(--bg)',height:'20px',height:'max(20px,env(safe-area-inset-top,0px))'}}/>

      {/* ── Desktop only: left sidebar ── */}
      <div className="desktop-sidebar">
        <BoxscoreLogo fontSize={20}/>
        <div style={{height:28}}/>
        {[
          {id:'home',   label:'Home',    Icon:IconHome},
          {id:'search', label:'Search',  Icon:IconSearch},
          {id:'friends',label:'Friends', Icon:IconPeople},
          {id:'profile',label:'Profile', Icon:IconPerson},
        ].map(item=>(
          <div key={item.id} className={`desktop-nav-item${activePage===item.id?' active':''}`} onClick={()=>navigate(item.id)}>
            <item.Icon active={activePage===item.id}/>
            <span>{item.label}</span>
            {item.id==='friends'&&badge>0&&(
              <span style={{marginLeft:'auto',minWidth:18,height:18,borderRadius:9,background:'var(--accent)',color:'#000',fontSize:10,fontWeight:900,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 4px'}}>{badge}</span>
            )}
          </div>
        ))}
        <div style={{height:12}}/>
        <button className="btn btn-primary btn-full" style={{fontSize:14,padding:'11px 0'}} onClick={()=>setAddGame(true)}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Game
        </button>
        <div style={{flex:1}}/>
        <div style={{borderTop:'1px solid var(--border)',paddingTop:12,marginTop:16}}>
          <div className="desktop-nav-item" style={{fontSize:13}} onClick={()=>sb.auth.signOut()}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Sign Out
          </div>
        </div>
      </div>

      {/* ── Main content area ── */}
      <div className="desktop-content" style={{flex:1,overflow:'hidden',height:'100%'}}>
        <PullToRefresh>
          <div style={{flex:1,overflow:'hidden',height:'100%'}}>
            {route.page==='home'          &&<HomePage        state={state} navigate={navigate} onRefresh={fetchApiGames} onMarkNotifsRead={()=>dispatch({type:'MARK_NOTIFS_READ'})} notifications={state.notifications||[]} dispatch={dispatch} showToast={showToast}/>}
            {route.page==='search'        &&<SearchPage      state={state} navigate={navigate}/>}
            {route.page==='leaderboard'   &&<LeaderboardPage state={state} navigate={navigate}/>}
            {route.page==='friends'       &&<FriendsPage     state={state} dispatch={dispatch} navigate={navigate} showToast={showToast}/>}
            {route.page==='profile'       &&<ProfilePage     state={state} dispatch={dispatch} navigate={navigate} showToast={showToast} onSignOut={()=>sb.auth.signOut()}/>}
            {route.page==='game'          &&<GamePage        gameId={route.params.gameId} state={state} dispatch={dispatch} navigate={navigate} showToast={showToast}/>}
            {route.page==='public_profile'&&<PublicProfilePage userId={route.params.userId} username={route.params.username} state={state} dispatch={dispatch} navigate={navigate} showToast={showToast}/>}
            {route.page==='list'          &&<ListDetailPage   listId={route.params.listId} state={state} dispatch={dispatch} navigate={navigate} showToast={showToast}/>}
          </div>
        </PullToRefresh>
      </div>

      {/* ── Mobile only: bottom nav ── */}
      <div className="nav">
        {NAV.map(tab=>(
          <div key={tab.id} className={`nav-item${activePage===tab.id?' active':''}`} onClick={()=>{if(tab.isAdd){setAddGame(true);return;}navigate(tab.id);}}>
            {tab.isAdd?(<div className="nav-add-btn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>):(<><div className="nav-icon"><tab.Icon active={activePage===tab.id}/></div><span className="nav-label">{tab.label}</span></>)}
          </div>
        ))}
      </div>

      {addGame&&<AddGameSheet onClose={()=>setAddGame(false)} onSelect={async(g)=>{await dispatch({type:'UPSERT_API_GAME',game:g});setAddGame(false);navigate('game',{gameId:'api_'+g.apiId});}}/>}
      {toast&&<div className="toast">{toast}</div>}
      <InstallBanner/>
      {showOnboarding&&<OnboardingFlow onDone={()=>setShowOnboarding(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
