<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>BOXSCORE</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#000000"/>
  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="BoxScore"/>
  <link rel="apple-touch-icon" href="icons/icon-180.png"/>
  <!-- Service Worker -->
  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load',()=>{
        navigator.serviceWorker.register('./sw.js').catch(()=>{});
      });
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ── DESIGN TOKENS ── */
    :root{
      --bg:#0a0a0f;--s1:#111118;--s2:#18181f;--s3:#202028;
      --border:rgba(255,255,255,0.07);
      --text:#f0f0f5;--text2:#9898a8;--text3:#55555f;
      --accent:#f0bf3d;--red:#ff453a;--green:#30d158;--blue:#0a84ff;
      /* Safe-area shorthands (with 0px fallback for non-supporting browsers) */
      --sat:env(safe-area-inset-top,0px);
      --sar:env(safe-area-inset-right,0px);
      --sab:env(safe-area-inset-bottom,0px);
      --sal:env(safe-area-inset-left,0px);
    }

    /* ── RESET & BASE ── */
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html{
      height:100%;
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
      overscroll-behavior:none;
    }
    body{
      height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;
      -webkit-font-smoothing:antialiased;
      overscroll-behavior:none;
      touch-action:manipulation;
    }
    #root{
      height:100%;
      /* phone cap only on mobile */
      max-width:430px;
      margin:0 auto;
      position:relative;
    }

    /* ── DESKTOP SIDEBAR (hidden on mobile) ── */
    .desktop-sidebar{ display:none; }
    .desktop-nav-item{
      display:flex;align-items:center;gap:12px;
      padding:11px 14px;border-radius:12px;
      cursor:pointer;font-size:15px;font-weight:600;
      color:var(--text3);transition:all 0.15s;
    }
    .desktop-nav-item:hover{background:var(--s2);color:var(--text);}
    .desktop-nav-item.active{background:rgba(240,191,61,0.12);color:var(--accent);}
    .desktop-nav-item svg{width:22px;height:22px;flex-shrink:0;}

    /* ── DESKTOP LAYOUT (≥ 768 px) ── */
    @media(min-width:768px){
      #root{ max-width:none; margin:0; }

      /* Switch app-root to side-by-side */
      .app-root{ flex-direction:row !important; }

      /* Hide mobile-only pieces */
      .status-bar-spacer{ display:none !important; }
      .nav{ display:none !important; }

      /* Show sidebar */
      .desktop-sidebar{
        display:flex;flex-direction:column;
        width:220px;flex-shrink:0;
        background:var(--s1);border-right:1px solid var(--border);
        padding:28px 12px 24px;
        overflow-y:auto;
      }

      /* Content column fills the rest */
      .desktop-content{
        flex:1;min-width:0;height:100%;overflow:hidden;
      }

      /* Cap and center page content */
      .page{max-width:680px;margin:0 auto;}

      /* Toast in bottom-right corner (no nav bar to avoid) */
      .toast{
        bottom:28px !important;
        right:28px !important;
        left:auto !important;
        transform:none !important;
      }

      /* Hide page-level logo (already in sidebar) */
      .logo-desktop-hide{ display:none !important; }

      /* Hide duplicate Sign Out on profile page */
      .profile-signout{ display:none !important; }

      /* Page title instead of logo on desktop */
      .app-hd .app-sub{
        font-size:16px;font-weight:800;color:var(--text);letter-spacing:-0.3px;
      }
    }
    input,textarea,button,select{font-family:inherit;font-size:15px;outline:none;}
    input,textarea,select{background:var(--s3);border:1.5px solid var(--border);border-radius:12px;color:var(--text);padding:11px 14px;width:100%;transition:border 0.15s;}
    input:focus,textarea:focus,select:focus{border-color:var(--accent);}
    textarea{resize:vertical;min-height:80px;}
    select{appearance:none;-webkit-appearance:none;}
    button{cursor:pointer;}

    /* ── BUTTONS ── */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:12px;padding:12px 20px;font-weight:700;font-size:15px;transition:opacity 0.15s,transform 0.1s;cursor:pointer;}
    .btn:active{transform:scale(0.97);}
    .btn-primary{background:var(--accent);color:#000;}
    .btn-ghost{background:var(--s3);color:var(--text);border:1.5px solid var(--border);}
    .btn-sm{padding:7px 14px;font-size:13px;border-radius:9px;}
    .btn-full{width:100%;}

    /* ── BOTTOM NAV ── */
    /* env() used directly with 0px fallback for browsers that don't support env() */
    .nav{
      display:flex;
      background:var(--s1);
      border-top:1px solid var(--border);
      padding-top:8px;
      padding-bottom:16px; /* base fallback */
      /* cap at 44px — prevents browser-toolbar from inflating to ~84px in Safari browser mode */
      padding-bottom:max(16px,min(env(safe-area-inset-bottom,0px),44px));
      padding-left:env(safe-area-inset-left,0px);
      padding-right:env(safe-area-inset-right,0px);
      flex-shrink:0;
    }
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;}
    .nav-icon{width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
    .nav-icon svg{width:24px;height:24px;color:var(--text3);transition:color 0.15s;}
    .nav-item.active .nav-icon svg{color:var(--accent);}
    .nav-label{font-size:10px;color:var(--text3);font-weight:500;transition:color 0.15s;}
    .nav-item.active .nav-label{color:var(--accent);}
    .nav-add-btn{width:48px;height:32px;background:var(--accent);border-radius:16px;display:flex;align-items:center;justify-content:center;color:#000;}

    /* ── PAGE SCROLL CONTAINER ── */
    .page{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}

    /* ── APP HEADER (Home/Search/Friends/Profile top bar) ── */
    /* Safe-area is handled by the root spacer div in React — just use visual padding here */
    .app-hd{
      display:flex;align-items:center;justify-content:space-between;
      padding:14px 16px 8px;
    }
    .app-logo{display:inline-flex;align-items:center;gap:7px;font-size:26px;font-weight:900;letter-spacing:-0.5px;}
    .app-sub{font-size:12px;color:var(--text3);}

    /* ── DETAIL / GAME / LIST HEADER ── */
    .detail-hd{
      padding:10px 16px 0;
      display:flex;align-items:center;gap:8px;
    }
    .back-btn{display:inline-flex;align-items:center;gap:5px;font-size:14px;font-weight:700;color:var(--accent);cursor:pointer;padding:6px 0;}

    /* ── SEARCH HEADER ── */
    .search-hd{
      padding:14px 16px 4px;
      background:var(--s1);border-bottom:1px solid var(--border);
    }
    .search-input{background:var(--s3);border:1.5px solid var(--border);border-radius:12px;color:var(--text);padding:10px 14px;width:100%;font-size:14px;}
    .search-input:focus{border-color:var(--accent);}

    /* ── SECTION ── */
    .section-hd{display:flex;align-items:center;gap:8px;padding:12px 16px 8px;}
    .section-title{font-size:17px;font-weight:800;letter-spacing:-0.3px;}
    .section-count{background:var(--s3);border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700;color:var(--text3);}

    /* ── LIVE ── */
    .live-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,69,58,0.15);color:var(--red);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:800;letter-spacing:0.3px;}
    .live-dot{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0;animation:pulse 1.4s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
    .status-chip{background:var(--s3);color:var(--text2);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;}
    .status-chip.live{background:rgba(255,69,58,0.15);color:var(--red);}

    /* ── SPORT PILLS ── */
    .sport-scroll{display:flex;gap:7px;overflow-x:auto;padding:10px 16px 4px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
    .sport-scroll::-webkit-scrollbar{display:none;}
    .s-pill{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;background:var(--s2);color:var(--text3);border:1.5px solid var(--border);transition:all 0.15s;flex-shrink:0;}
    .s-pill.active{background:rgba(240,191,61,0.15);border-color:var(--sport-c,var(--accent));color:var(--sport-c,var(--accent));} /* fallback */
    .s-pill.active{background:color-mix(in srgb,var(--sport-c,var(--accent)) 15%,transparent);}
    .s-dot{width:7px;height:7px;border-radius:50%;background:var(--sport-c,var(--accent));flex-shrink:0;}

    /* ── SPORT COLORS & BADGES ── */
    .sc-all{--sport-c:#f0bf3d;} .sc-nba{--sport-c:#ff6b35;} .sc-nfl{--sport-c:#4895ef;} .sc-mlb{--sport-c:#e5383b;} .sc-nhl{--sport-c:#00c3ff;} .sc-soccer{--sport-c:#47d98e;} .sc-epl{--sport-c:#7b2fbe;} .sc-laliga{--sport-c:#ee8707;} .sc-ucl{--sport-c:#3d6fd4;} .sc-seriea{--sport-c:#00529a;} .sc-bundesliga{--sport-c:#d3010c;} .sc-ligue1{--sport-c:#dba111;} .sc-mls{--sport-c:#002f6c;}
    .sport-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(240,191,61,0.15);color:var(--sport-c,var(--accent));} /* fallback */
    .sport-badge{background:color-mix(in srgb,var(--sport-c,var(--accent)) 15%,transparent);}

    /* ── HORIZONTAL STRIP ── */
    .h-strip{display:flex;gap:10px;overflow-x:auto;padding:0 16px 6px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
    .h-strip::-webkit-scrollbar{display:none;}

    /* ── MINI CARD ── */
    .mini-card{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:12px;cursor:pointer;min-width:150px;flex-shrink:0;transition:background 0.12s;border-left:3px solid var(--sport-c,var(--accent));}
    .mini-card:active{background:var(--s3);}
    .mini-badge{font-size:10px;font-weight:700;color:var(--sport-c,var(--text3));margin-bottom:8px;}
    .mini-team-row{display:flex;align-items:center;gap:5px;margin-bottom:5px;}
    .mini-abbr{font-size:12px;font-weight:800;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .mini-score{font-size:14px;font-weight:900;margin-left:auto;}
    .mini-footer{display:flex;align-items:center;justify-content:space-between;margin-top:7px;padding-top:7px;border-top:1px solid var(--border);}
    .mini-date{font-size:10px;color:var(--text3);}

    /* ── GAME CARD ── */
    .game-card{background:var(--s2);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:background 0.12s;flex-shrink:0;}
    .game-card:active{background:var(--s3);}
    .gc-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;border-bottom:1px solid var(--border);}
    .gc-sport{font-size:12px;font-weight:700;color:var(--sport-c,var(--text2));}
    .gc-meta{font-size:11px;color:var(--text3);}
    .gc-body{padding:12px 14px;display:flex;flex-direction:column;gap:8px;}
    .gc-team-row{display:flex;align-items:center;gap:8px;}
    .gc-team-row.winner .gc-fullname{color:var(--text);font-weight:800;}
    .gc-team-row.loser .gc-fullname{color:var(--text3);}
    .gc-team-row.loser .gc-score{color:var(--text3);}
    .gc-fullname{font-size:14px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .gc-score{font-size:16px;font-weight:900;letter-spacing:-0.5px;margin-left:auto;}
    .gc-win-dot{width:6px;height:6px;border-radius:50%;background:var(--sport-c,var(--accent));flex-shrink:0;margin-left:4px;}
    .gc-divider{height:1px;background:var(--border);}
    .gc-foot{display:flex;align-items:center;justify-content:space-between;padding:8px 14px 10px;border-top:1px solid var(--border);}
    .gc-avg{font-size:12px;font-weight:700;color:var(--accent);}
    .gc-cnt{font-size:11px;color:var(--text3);}

    /* ── HERO CARD ── */
    .hero-card{background:var(--s2);border:1px solid var(--border);border-radius:20px;margin:0 16px;overflow:hidden;cursor:pointer;transition:box-shadow 0.3s;}
    .hero-card--live{border-color:rgba(255,69,58,0.55);box-shadow:0 0 0 1px rgba(255,69,58,0.2),0 4px 24px rgba(255,69,58,0.18);animation:live-glow 2.4s ease-in-out infinite;}
    @keyframes live-glow{0%,100%{box-shadow:0 0 0 1px rgba(255,69,58,0.2),0 4px 24px rgba(255,69,58,0.18);}50%{box-shadow:0 0 0 1px rgba(255,69,58,0.35),0 4px 32px rgba(255,69,58,0.32);}}
    @keyframes ob-in{from{opacity:0;transform:translateX(40px);}to{opacity:1;transform:translateX(0);}}
    @keyframes ob-in-back{from{opacity:0;transform:translateX(-40px);}to{opacity:1;transform:translateX(0);}}
    .ob-slide{animation:ob-in 0.28s cubic-bezier(0.25,0.46,0.45,0.94) both;}
    .ob-slide-back{animation:ob-in-back 0.28s cubic-bezier(0.25,0.46,0.45,0.94) both;}
    .ob-emoji-glow{transition:filter 0.4s ease,transform 0.4s ease;}
    .ob-tip{background:var(--s2);border:1.5px solid var(--border);border-radius:14px;padding:12px 16px;font-size:14px;color:var(--text);font-weight:500;text-align:left;line-height:1.4;display:flex;align-items:center;gap:10px;}
    .ob-tip-icon{font-size:20px;flex-shrink:0;width:28px;text-align:center;}
    .hero-card-top{display:flex;align-items:center;gap:8px;padding:14px 16px 10px;border-bottom:1px solid var(--border);}
    .hero-badge{font-size:12px;font-weight:700;color:var(--sport-c,var(--accent));}
    .hero-date{font-size:11px;color:var(--text3);margin-left:auto;}
    .hero-matchup{display:flex;align-items:center;justify-content:space-between;padding:20px 16px;}
    .hero-team-side{display:flex;flex-direction:column;align-items:center;flex:1;}
    .hero-team-side.right{align-items:center;}
    .hero-abbr{font-size:22px;font-weight:900;letter-spacing:-0.5px;}
    .hero-team-name{font-size:11px;color:var(--text3);text-align:center;margin-top:2px;}
    .hero-score-block{display:flex;align-items:center;gap:4px;}
    .hero-score{font-size:32px;font-weight:900;letter-spacing:-1.5px;}
    .hero-vs{font-size:18px;font-weight:700;color:var(--text3);padding:0 8px;}
    .hero-card-bot{display:flex;align-items:center;justify-content:space-between;padding:8px 16px 14px;}
    .hero-venue{font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

    /* ── STARS ── */
    .stars{display:inline-flex;gap:1px;line-height:1;}
    .star-f{color:var(--accent);}
    .star-e{color:var(--s3);}
    .star-picker{display:flex;justify-content:center;gap:8px;margin-bottom:4px;}
    .star-pick{font-size:36px;cursor:pointer;transition:transform 0.1s;}
    .star-pick:active{transform:scale(1.2);}

    /* ── LIKE ── */
    .like-btn{background:none;border:none;display:inline-flex;align-items:center;gap:5px;color:var(--text3);font-size:12px;padding:4px 0;cursor:pointer;margin-top:6px;font-weight:600;transition:color 0.15s;}
    .like-btn svg{width:14px;height:14px;}
    .like-btn.liked{color:var(--red);}

    /* ── REVIEW ── */
    .review-card{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:14px 16px;}
    .review-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;}
    .reviewer-name{font-size:14px;font-weight:700;margin-bottom:3px;}
    .review-body{font-size:14px;color:var(--text2);line-height:1.55;margin-top:5px;}
    .review-date{font-size:11px;color:var(--text3);}
    .review-video-link{display:inline-block;margin-top:8px;font-size:12px;color:var(--accent);text-decoration:none;}

    /* ── VIDEO ── */
    .vid-thumb{position:relative;border-radius:12px;overflow:hidden;cursor:pointer;margin-bottom:8px;aspect-ratio:16/9;}
    .vid-thumb img{width:100%;height:100%;object-fit:cover;}
    .vid-play-btn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:36px;background:rgba(0,0,0,0.4);}
    .vid-label{position:absolute;bottom:0;left:0;right:0;padding:8px 12px;background:linear-gradient(transparent,rgba(0,0,0,0.7));font-size:12px;font-weight:600;}
    .vid-embed{border-radius:12px;overflow:hidden;aspect-ratio:16/9;margin-bottom:8px;}
    .vid-embed iframe{width:100%;height:100%;border:none;}

    /* ── GAME DETAIL MATCHUP ── */
    .detail-sport-bar{padding:12px 16px 14px;border-bottom:1px solid var(--border);}
    .detail-matchup{display:flex;align-items:center;justify-content:space-between;padding:24px 20px;}
    .detail-team-col{display:flex;flex-direction:column;align-items:center;flex:1;}
    .detail-team-abbr{font-size:26px;font-weight:900;letter-spacing:-1px;}
    .detail-team-name{font-size:11px;color:var(--text3);margin-top:2px;text-align:center;}
    .detail-score-mid{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;padding:0 12px;}
    .detail-score{font-size:34px;font-weight:900;letter-spacing:-1.5px;}
    .detail-vs{font-size:20px;font-weight:700;color:var(--text3);}

    /* ── SEARCH FILTERS ── */
    .f-pill{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;background:var(--s2);color:var(--text3);border:1.5px solid var(--border);transition:all 0.15s;flex-shrink:0;}
    .f-pill.active{background:rgba(240,191,61,0.18);border-color:var(--sport-c,var(--accent));color:var(--sport-c,var(--accent));} /* fallback */
    .f-pill.active{background:color-mix(in srgb,var(--sport-c,var(--accent)) 18%,transparent);}
    .team-ac-wrap{position:relative;}
    .ac-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--s2);border:1px solid var(--border);border-radius:12px;z-index:50;max-height:220px;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.5);}
    .ac-hdr{font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--text3);padding:8px 12px 4px;}
    .ac-item{padding:10px 12px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background 0.1s;}
    .ac-item:hover{background:var(--s3);}
    .ac-item mark{background:none;color:var(--accent);font-weight:700;}

    /* ── OVERLAY / BOTTOM SHEET ── */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;display:flex;align-items:flex-end;}
    .sheet{
      background:var(--s1);border-radius:24px 24px 0 0;
      width:100%;
      max-height:92vh; /* fallback */
      max-height:92dvh;
      overflow-y:auto;
      padding-top:16px;
      padding-bottom:32px; /* base fallback */
      padding-bottom:max(32px,env(safe-area-inset-bottom,0px));
      padding-left:16px; /* base fallback */
      padding-left:max(16px,env(safe-area-inset-left,0px));
      padding-right:16px; /* base fallback */
      padding-right:max(16px,env(safe-area-inset-right,0px));
    }
    .sheet-handle{width:36px;height:4px;background:var(--s3);border-radius:2px;margin:0 auto 16px;}

    /* ── TOAST ── */
    /* sits above the nav bar + home indicator */
    .toast{
      position:fixed;
      bottom:calc(56px + 52px); /* base fallback */
      bottom:calc(max(56px,env(safe-area-inset-bottom,0px)) + 52px);
      left:50%;transform:translateX(-50%);
      background:var(--s3);border:1px solid var(--border);
      color:var(--text);padding:10px 20px;border-radius:24px;
      font-size:14px;font-weight:600;z-index:200;
      white-space:nowrap;max-width:calc(100vw - 32px);
      box-shadow:0 8px 32px rgba(0,0,0,0.6);
    }

    /* ── SPINNER ── */

/* ── ESPN API ── */
const SPORT_PARENT = {nba:'nba',nfl:'nfl',mlb:'mlb',nhl:'nhl',mls:'soccer',epl:'soccer',laliga:'soccer',ucl:'soccer',seriea:'soccer',bundesliga:'soccer',ligue1:'soccer'};
const LEAGUE_LABELS = {mls:'MLS',epl:'Premier League',laliga:'La Liga',ucl:'UCL',seriea:'Serie A',bundesliga:'Bundesliga',ligue1:'Ligue 1',nba:'NBA',nfl:'NFL',mlb:'MLB',nhl:'NHL'};
const LEAGUE_PATHS = {
  nba:'basketball/nba', nfl:'american-football/nfl', mlb:'baseball/mlb', nhl:'hockey/nhl',
  epl:'soccer/eng.1', laliga:'soccer/esp.1', ucl:'soccer/uefa.champions',
  seriea:'soccer/ita.1', bundesliga:'soccer/ger.1', ligue1:'soccer/fra.1', mls:'soccer/usa.1',
};
async function fetchLeagueGames(sportKey) {
  const path = LEAGUE_PATHS[sportKey]; if(!path) return [];
  try {
    const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${path}/scoreboard`);
    const data = await res.json();
    return (data.events||[]).map(ev=>parseEspnEvent(ev,sportKey));
  } catch(e){ return []; }
}
async function fetchRecentLeagueGames(sportKey, count=10, daysBack=14) {
  const path = LEAGUE_PATHS[sportKey]; if(!path) return [];
  // Build array of date strings: today going back daysBack days
  const now = new Date();
  const dateStrs = Array.from({length:daysBack+1},(_,i)=>{
    const d=new Date(now.getTime()-i*86400000);
    return d.toISOString().split('T')[0].replace(/-/g,'');
  });
  try {
    const results = await Promise.all(dateStrs.map(async date=>{
      try {
        const res=await fetch(`https://site.api.espn.com/apis/site/v2/sports/${path}/scoreboard?dates=${date}`);
        const data=await res.json();
        return (data.events||[]).map(ev=>parseEspnEvent(ev,sportKey));
      } catch(e){ return []; }
    }));
    const seen=new Set();
    return results.flat()
      .filter(g=>{ if(seen.has(g.apiId))return false; seen.add(g.apiId); return true; })
      .sort((a,b)=>new Date(b.datetime||b.date)-new Date(a.datetime||a.date))
      .slice(0,count);
  } catch(e){ return []; }
}

async function fetchRoster(sportPath, teamId) {
  if(!teamId||!sportPath) return [];
  try {
    const res=await fetch(`https://site.api.espn.com/apis/site/v2/sports/${sportPath}/teams/${teamId}/roster`);
    const d=await res.json();
    const a=d.athletes||[];
    if(!a.length) return [];
    // Flat array (soccer, NBA) vs grouped by position (NHL, MLB)
    if(a[0]?.displayName) return a.map(p=>p.displayName).filter(Boolean);
    return a.flatMap(g=>(g.items||[]).map(p=>p.displayName)).filter(Boolean);
  } catch(e){ return []; }
}

function parseEspnEvent(ev, sportKey) {
  const comp=ev.competitions?.[0]||{}, comps=comp.competitors||[];
  const home=comps.find(c=>c.homeAway==='home')||comps[0]||{};
  const away=comps.find(c=>c.homeAway==='away')||comps[1]||{};
  const status=comp.status||{}, st=status.type?.state||'pre';
  // Series / playoff data
  const series=comp.series||null;
  const seriesType=series?.type?.text||''; // "Best of 7"
  const seriesSummary=series?.summary||'';
  // ESPN puts per-team wins in series.competitors array
  const seriesComps=series?.competitors||[];
  const homeSeriesComp=seriesComps.find(c=>c.id===home.team?.id)||null;
  const awaySeriesComp=seriesComps.find(c=>c.id===away.team?.id)||null;
  const homeSeriesWins=homeSeriesComp?parseInt(homeSeriesComp.wins||0):null;
  const awaySeriesWins=awaySeriesComp?parseInt(awaySeriesComp.wins||0):null;
  const isPlayoff=!!(series||comp.notes?.some(n=>n.type==='event'&&/playoff|postseason|round/i.test(n.headline||'')));
  const roundText=comp.notes?.find(n=>n.type==='event')?.headline||'';
  const seriesInfo=seriesSummary||(isPlayoff&&roundText?roundText:'');
  return {
    fromApi:true, apiId:ev.id, id:'api_'+ev.id, sport:SPORT_PARENT[sportKey]||sportKey, league:sportKey,
    home:home.team?.displayName||'', away:away.team?.displayName||'',
    home_abbr:home.team?.abbreviation||'', away_abbr:away.team?.abbreviation||'',
    homeScore:st!=='pre'?parseInt(home.score||0):undefined,
    awayScore:st!=='pre'?parseInt(away.score||0):undefined,
    homeTeamId:home.team?.id, awayTeamId:away.team?.id,
    venue:comp.venue?.fullName||'', date:ev.date?.split('T')[0]||'',
    datetime:ev.date, status:st, statusDetail:status.type?.shortDetail||'',
    period:status.period, clock:status.displayClock,
    homeRecord:home.records?.[0]?.summary||'', awayRecord:away.records?.[0]?.summary||'',
    seriesInfo, seriesType, homeSeriesWins, awaySeriesWins, isPlayoff,
    tags:[], description:'', videoUrl:'',
  };
}
function gameDateLabel(game) {
  if(!game.datetime&&!game.date) return '';
  if(game.status==='in') return game.statusDetail||'LIVE';
  const d=new Date(game.datetime||game.date), now=new Date();
  const isToday=d.toDateString()===now.toDateString();
  const isTomorrow=new Date(now.getTime()+86400000).toDateString()===d.toDateString();
  const timeStr=game.datetime?d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/New_York'})+' ET':'';
  if(game.status==='post') return isToday?'Final':MONTHS[d.getMonth()]+' '+d.getDate()+' · Final';
  if(isToday) return timeStr?'Today · '+timeStr:'Today';
  if(isTomorrow) return timeStr?'Tomorrow · '+timeStr:'Tomorrow';
  return MONTHS[d.getMonth()]+' '+d.getDate()+(timeStr?' · '+timeStr:'');
}

const STAR_LABELS={0.5:'Unwatchable',1:'Terrible',1.5:'Very Bad',2:'Bad',2.5:'Below Average',3:'Average',3.5:'Good',4:'Great',4.5:'Excellent',5:'Classic'};

function StarPicker({ rating, onChange }) {
  const [hover,setHover]=useState(null);
  const shown=hover??rating;
  const containerRef=useRef(null);

  const valFromTouch=(e)=>{
    if(!containerRef.current)return null;
    const rect=containerRef.current.getBoundingClientRect();
    const t=e.touches?e.touches[0]:e.changedTouches?.[0];
    if(!t)return null;
    const x=t.clientX-rect.left;
    const slotW=rect.width/5;
    const idx=Math.max(0,Math.min(4,Math.floor(x/slotW)));
    const frac=(x-idx*slotW)/slotW;
    return idx+(frac<0.5?0.5:1);
  };

  return (
    <div>
      <div ref={containerRef} style={{display:'flex',justifyContent:'center',gap:6,marginBottom:10,touchAction:'none'}}
        onMouseLeave={()=>setHover(null)}
        onTouchMove={e=>{const v=valFromTouch(e);if(v)setHover(v);}}
        onTouchEnd={e=>{const v=valFromTouch(e);if(v!==null)onChange(v);setHover(null);}}>
        {[1,2,3,4,5].map(i=>{
          const pct=Math.max(0,Math.min(1,shown-(i-1)))*100;
          return (
            <div key={i} style={{position:'relative',width:44,height:44,flexShrink:0,cursor:'pointer'}}>
              {/* base star */}
              <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:38,color:'rgba(255,255,255,0.12)',lineHeight:1,pointerEvents:'none',userSelect:'none'}}>★</div>
              {/* filled overlay */}
              <div style={{position:'absolute',top:0,left:0,height:'100%',width:`${pct}%`,overflow:'hidden',pointerEvents:'none'}}>
                <div style={{width:44,display:'flex',alignItems:'center',justifyContent:'center',fontSize:38,color:'#f0bf3d',lineHeight:1,height:'100%',userSelect:'none'}}>★</div>
              </div>
              {/* left half → half-star */}
              <div style={{position:'absolute',left:0,top:0,width:'50%',height:'100%',zIndex:2}}
                onMouseEnter={()=>setHover(i-0.5)}
                onClick={()=>onChange(i-0.5)}/>
              {/* right half → full star */}
              <div style={{position:'absolute',right:0,top:0,width:'50%',height:'100%',zIndex:2}}
                onMouseEnter={()=>setHover(i)}
                onClick={()=>onChange(i)}/>
            </div>
          );
        })}
      </div>
      <div style={{textAlign:'center',height:22}}>
        {shown>0&&<span style={{fontSize:14,fontWeight:700,color:'#f0bf3d'}}>{shown} <span style={{color:'var(--text2)',fontWeight:500,fontSize:13}}>{STAR_LABELS[shown]||''}</span></span>}
      </div>
    </div>
  );
}

function usePullToRefresh(onRefresh) {
  const ref = useRef(null);
  const [dist, setDist] = useState(0);
  const [refreshing, setRefreshing] = useState(false);
  const startY = useRef(0);
  const distRef = useRef(0);
  const THRESHOLD = 64;
  useEffect(()=>{
    const el = ref.current;
    if(!el) return;
    const onStart = e => { startY.current = e.touches[0].pageY; };
    const onMove = e => {
      if(el.scrollTop > 2) { startY.current = e.touches[0].pageY; return; }
      const d = Math.max(0,(e.touches[0].pageY - startY.current)*0.45);
      distRef.current = d;
      setDist(Math.min(d, THRESHOLD+16));
    };
    const onEnd = async () => {
      const d = distRef.current;
      distRef.current = 0; setDist(0);
      if(d >= THRESHOLD) { setRefreshing(true); await onRefresh(); setRefreshing(false); }
    };
    el.addEventListener('touchstart', onStart, {passive:true});
    el.addEventListener('touchmove', onMove, {passive:true});
    el.addEventListener('touchend', onEnd);
    return()=>{ el.removeEventListener('touchstart',onStart); el.removeEventListener('touchmove',onMove); el.removeEventListener('touchend',onEnd); };
  },[onRefresh]);
  return { ref, dist, refreshing, THRESHOLD };
}

/* ── NOTIFICATIONS SHEET ── */
function NotificationsSheet({ notifications, games, apiGames, onClose, onMarkRead, navigate, dispatch, showToast, friendRequests }) {
  const allGames = useMemo(()=>[...(apiGames||[]),...games],[apiGames,games]);
  useEffect(()=>{ if(notifications.some(n=>!n.read)) onMarkRead(); },[]);
  const relTime = d => { if(!d)return''; const s=Math.floor((Date.now()-new Date(d))/1000); if(s<60)return'just now'; if(s<3600)return Math.floor(s/60)+'m ago'; if(s<86400)return Math.floor(s/3600)+'h ago'; return Math.floor(s/86400)+'d ago'; };
  const icon = t => t==='like'?'❤️':t==='follow'?'👤':t==='friend_request'?'🤝':t==='friend_accepted'?'🎉':'🔔';
  const text = n => {
    const g = n.gameId ? allGames.find(x=>x.id===n.gameId) : null;
    if(n.type==='like') return <span><b>{n.fromUsername}</b>{' liked your review'}{g?` of ${abbr(g.away)} vs ${abbr(g.home)}`:''}</span>;
    if(n.type==='follow') return <span><b>{n.fromUsername}</b>{' started following you'}</span>;
    if(n.type==='friend_request') return <span><b>{n.fromUsername}</b>{' sent you a friend request'}</span>;
    if(n.type==='friend_accepted') return <span><b>{n.fromUsername}</b>{' accepted your friend request 🎉'}</span>;
    return <span>{n.fromUsername}</span>;
  };

  const FriendRequestActions = ({n}) => {
    // useState must come before any conditional return (Rules of Hooks)
    const [busy,setBusy]=useState(false);
    const req = (friendRequests||[]).find(r=>r.fromUserId===n.fromUserId&&r.status==='pending');
    if(!req) return null;
    const handle=async(type)=>{
      setBusy(true);
      await dispatch({type,requestId:req.id});
      setBusy(false);
      if(type==='ACCEPT_FRIEND_REQUEST') showToast('🎉 Friends with '+n.fromUsername+'!');
      else showToast('Request declined');
    };
    return(
      <div style={{display:'flex',gap:6,marginTop:8}}>
        <button className="btn btn-primary btn-sm" disabled={busy} style={{flex:1,padding:'6px 0',fontSize:12}} onClick={e=>{e.stopPropagation();handle('ACCEPT_FRIEND_REQUEST');}}>Accept</button>
        <button className="btn btn-ghost btn-sm" disabled={busy} style={{flex:1,padding:'6px 0',fontSize:12}} onClick={e=>{e.stopPropagation();handle('DECLINE_FRIEND_REQUEST');}}>Decline</button>
      </div>
    );
  };

  return (
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="sheet" style={{maxHeight:'75vh',display:'flex',flexDirection:'column'}}>
        <div className="sheet-handle"/>
        <div style={{fontSize:17,fontWeight:800,marginBottom:12,flexShrink:0}}>Notifications</div>
        {notifications.length===0
          ?<div className="empty"><div className="empty-icon">🔔</div><p>No notifications yet</p></div>
          :<div style={{overflowY:'auto',flex:1}}>
            {notifications.map(n=>(
              <div key={n.id} style={{padding:'12px 0',borderBottom:'1px solid var(--border)',background:n.read?'transparent':'rgba(240,191,61,0.06)',borderRadius:8}}>
                <div style={{display:'flex',gap:12,cursor:n.gameId||n.fromUserId?'pointer':'default'}}
                  onClick={()=>{if(n.type==='friend_request')return;if(n.gameId)navigate('game',{gameId:n.gameId});else if(n.fromUserId)navigate('public_profile',{userId:n.fromUserId,username:n.fromUsername});onClose();}}>
                  <div style={{fontSize:20,flexShrink:0,paddingTop:2}}>{icon(n.type)}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,color:'var(--text)',lineHeight:1.4}}>{text(n)}</div>
                    <div style={{fontSize:11,color:'var(--text3)',marginTop:3}}>{relTime(n.date)}</div>
                    {n.type==='friend_request'&&<FriendRequestActions n={n}/>}
                  </div>
                  {!n.read&&<div style={{width:7,height:7,borderRadius:'50%',background:'var(--accent)',flexShrink:0,marginTop:5}}/>}
                </div>
              </div>
            ))}
          </div>}
      </div>
    </div>
  );
}

  const unreadCount = (notifications||[]).filter(n=>!n.read).length;
  const featured = useMemo(()=>{
    const now = new Date();
    const today = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    const SPORT_RANK = {nfl:5,nba:4,mlb:3,ucl:3,epl:2,laliga:2,mls:2,seriea:2,bundesliga:2,ligue1:2,nhl:1};
    const localDate = str => { if(!str)return''; const d=new Date(str); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
    const isPlayoffGame = g => {
      const combined = ((g.statusDetail||'')+(g.description||'')+(g.tags||[]).join(' ')).toLowerCase();
      return g.isPlayoff ||
        /game \d|finals|conference final|semifinal|quarterfinal|playoff|super bowl|stanley cup|world series/i.test(combined);
    };
    const score = g => {
      let s = 0;
      const gameDate = g.datetime ? localDate(g.datetime) : (g.date||'').slice(0,10);
      if(gameDate === today) s += 20000;
      if(g.status === 'in') s += 10000;
      if(isPlayoffGame(g)) s += 5000;
      if(g.datetime){ const h=new Date(g.datetime).getHours(); if(h>=19&&h<=23) s+=100; }
      s += (SPORT_RANK[g.league]||SPORT_RANK[g.sport]||0)*10;
      s += state.reviews.filter(r=>r.gameId===g.id).length;
      return s;
    };
    const allGames = [...(state.apiGames||[]), ...state.games];
    return allGames.slice().sort((a,b)=>score(b)-score(a))[0]||null;
  },[state.games, state.apiGames, state.reviews]);
  const topPicks = useMemo(()=>state.games.map(g=>({...g,avg:avgRating(state.reviews.filter(r=>r.gameId===g.id))})).filter(g=>g.avg>0).sort((a,b)=>b.avg-a.avg).slice(0,8),[state]);
  const trending = useMemo(()=>{
    const cutoff = new Date(Date.now()-7*24*60*60*1000).toISOString().split('T')[0];
    const allG = [...(state.apiGames||[]),...state.games];
    const counts = {};
    state.reviews.filter(r=>(r.date||'')>=cutoff).forEach(r=>{counts[r.gameId]=(counts[r.gameId]||0)+1;});
    return Object.entries(counts).filter(([,c])=>c>0).sort((a,b)=>b[1]-a[1]).slice(0,8)
      .map(([id,cnt])=>{const g=allG.find(g=>g.id===id);return g?{...g,recentCnt:cnt}:null;}).filter(Boolean);
  },[state.reviews,state.games,state.apiGames]);
  const filtered = useMemo(()=>{
    const ok = g => sport==='all' || g.sport===sport;
    const reviewedIds = new Set(state.reviews.map(r=>r.gameId));
    // Self-dedup API games by matchup key (handles ESPN returning same event twice)
    const seen = new Set();
    const apiGames = (state.apiGames||[]).filter(ok).filter(g=>{
      const k=`${g.home}|${g.away}|${g.date}`; if(seen.has(k))return false; seen.add(k); return true;
    }).sort((a,b)=>{const o={in:0,post:1,pre:2};return(o[a.status]||1)-(o[b.status]||1);});
    // DB games: exclude anything already in API feed; only show if reviewed OR added <60 days ago
    const apiIds = new Set(apiGames.map(g=>g.id));
    const apiKeys = new Set(apiGames.map(g=>`${g.home}|${g.away}|${g.date}`));
    const cutoff = new Date(Date.now() - 60*24*60*60*1000).toISOString().split('T')[0];
    const dbGames = state.games
      .filter(g=>ok(g) && !apiIds.has(g.id) && !apiKeys.has(`${g.home}|${g.away}|${g.date}`) && (reviewedIds.has(g.id) || g.date >= cutoff))
      .sort((a,b)=>new Date(b.date)-new Date(a.date));
    return [...apiGames, ...dbGames];

        <div style={{position:'relative',cursor:'pointer'}} onClick={()=>setShowNotifs(true)}>
          <IconBell/>
          {unreadCount>0&&<div style={{position:'absolute',top:-4,right:-4,background:'var(--red)',color:'#fff',borderRadius:'50%',width:16,height:16,fontSize:10,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>{unreadCount>9?'9+':unreadCount}</div>}
        </div>
      </div>
      <div style={{position:'sticky',top:0,zIndex:10,background:'var(--bg)',paddingBottom:4,borderBottom:'1px solid var(--border)'}}>
        <div className="sport-scroll">{SPORTS.map(s=><div key={s.id} className={`s-pill sc-${s.id}${sport===s.id?' active':''}`} onClick={()=>setSport(s.id)}>{s.id!=='all'&&<span className="s-dot"/>}{s.emoji} {s.label}</div>)}</div>
      </div>
      {liveGames.length>0&&(
        <><div className="section-hd" style={{paddingTop:12}}><span style={{display:'flex',alignItems:'center',gap:6}}><span className="live-dot" style={{width:8,height:8}}/><span className="section-title">Live Now</span></span><span className="section-count">{liveGames.length}</span></div>

/* ── PUBLIC PROFILE PAGE ── */
function PublicProfilePage({ userId, username, state, dispatch, navigate, showToast }) {
  const [profileData, setProfileData] = useState(null);
  const [userReviews, setUserReviews] = useState([]);
  const [loading, setLoading] = useState(true);
  const [followModal, setFollowModal] = useState(null);
  const [followersCount, setFollowersCount] = useState(0);
  const [followingCount, setFollowingCount] = useState(0);
  const isFollowing = (state.follows||[]).some(f=>f.following_id===userId);
  const isSelf = state.currentUser.id === userId;

  // Friend request state
  const myRequests = state.friendRequests||[];
  const outgoing = myRequests.find(r=>r.fromUserId===state.currentUser.id&&r.toUserId===userId);
  const incoming = myRequests.find(r=>r.fromUserId===userId&&r.toUserId===state.currentUser.id);
  const isFriends = myRequests.some(r=>((r.fromUserId===state.currentUser.id&&r.toUserId===userId)||(r.fromUserId===userId&&r.toUserId===state.currentUser.id))&&r.status==='accepted');

  useEffect(()=>{
    async function load() {
      const [pR,rR,folR,folByR] = await Promise.all([
        sb.from('profiles').select('*').eq('id',userId).single(),
        sb.from('reviews').select('*').eq('user_id',userId).order('created_at',{ascending:false}),
        sb.from('follows').select('id',{count:'exact'}).eq('following_id',userId),
        sb.from('follows').select('id',{count:'exact'}).eq('follower_id',userId),
      ]);
      setProfileData(pR.data);
      setUserReviews((rR.data||[]).map(normalizeReview));
      setFollowersCount(folR.count||0);
      setFollowingCount(folByR.count||0);
      setLoading(false);
    }
    load();
  },[userId]);

  const displayName = profileData?.username || username || 'User';
  const avgR = userReviews.length ? (userReviews.reduce((a,b)=>a+b.rating,0)/userReviews.length).toFixed(1) : '—';

  const FriendBtn = () => {
    const [busy,setBusy]=useState(false);
    if(isFriends) return <div style={{marginTop:8,fontSize:12,color:'var(--green)',fontWeight:700}}>✓ Friends</div>;
    if(incoming&&incoming.status==='pending') return(
      <div style={{display:'flex',gap:6,marginTop:8}}>
        <button className="btn btn-primary btn-sm" disabled={busy} style={{fontSize:12}} onClick={async()=>{setBusy(true);const r=await dispatch({type:'ACCEPT_FRIEND_REQUEST',requestId:incoming.id});setBusy(false);showToast(r?.ok?'🎉 Friends with '+displayName+'!':'Error');}}>Accept Request</button>
        <button className="btn btn-ghost btn-sm" disabled={busy} style={{fontSize:12}} onClick={async()=>{setBusy(true);await dispatch({type:'DECLINE_FRIEND_REQUEST',requestId:incoming.id});setBusy(false);showToast('Declined');}}>Decline</button>
      </div>
    );
    if(outgoing&&outgoing.status==='pending') return(
      <button className="btn btn-ghost btn-sm" disabled={busy} style={{marginTop:8,fontSize:12}} onClick={async()=>{setBusy(true);await dispatch({type:'CANCEL_FRIEND_REQUEST',requestId:outgoing.id});setBusy(false);showToast('Request cancelled');}}>⏳ Request Sent — Cancel</button>
    );
    return(
      <button className="btn btn-ghost btn-sm" disabled={busy} style={{marginTop:8,fontSize:12}} onClick={async()=>{setBusy(true);const r=await dispatch({type:'SEND_FRIEND_REQUEST',userId,username:displayName});setBusy(false);showToast(r?.ok?'Friend request sent!':'Error: '+(r?.error||''));}}>🤝 Add Friend</button>
    );
  };

  if(loading) return <div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center'}}><div className="spinner"/></div>;

  return (
    <div className="page">
      <div className="detail-hd">
        <div className="back-btn" onClick={()=>navigate('home')}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg> Back</div>
      </div>
      <div className="profile-hd">
        <AvatarImg name={displayName} url={profileData?.avatar_url} size={72}/>
        <div className="profile-name">{displayName}</div>
        {profileData?.bio&&<div style={{fontSize:13,color:'var(--text2)',textAlign:'center',margin:'4px 16px 0',lineHeight:1.4}}>{profileData.bio}</div>}
        {!isSelf&&(
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,marginTop:12}}>
            <button className={"btn btn-sm " + (isFollowing?'btn-ghost':'btn-primary')}
              onClick={()=>{dispatch({type:isFollowing?'UNFOLLOW':'FOLLOW',userId,username:displayName});showToast(isFollowing?'Unfollowed':'Following '+displayName+'!');}}>
              {isFollowing?'Following ✓':'+ Follow'}
            </button>
            <FriendBtn/>
          </div>
        )}
        <div className="profile-stats" style={{marginTop:14}}>
          <div><div className="stat-num">{userReviews.length}</div><div className="stat-lbl">Reviews</div></div>
          <div style={{cursor:'pointer'}} onClick={()=>setFollowModal('followers')}><div className="stat-num" style={{color:'var(--accent)'}}>{followersCount}</div><div className="stat-lbl">Followers</div></div>
          <div style={{cursor:'pointer'}} onClick={()=>setFollowModal('following')}><div className="stat-num" style={{color:'var(--accent)'}}>{followingCount}</div><div className="stat-lbl">Following</div></div>
          <div><div className="stat-num">{avgR}</div><div className="stat-lbl">Avg ★</div></div>
        </div>
      </div>
      {followModal&&<FollowListModal type={followModal} userId={userId} state={state} dispatch={dispatch} navigate={navigate} showToast={showToast} onClose={()=>setFollowModal(null)}/>}
      <div style={{height:1,background:'var(--border)'}}/>
      <div style={{padding:'16px'}} className="gap-stack">
        {userReviews.length===0
          ?<div className="empty"><div className="empty-icon">📝</div><p>No reviews yet</p></div>
          :userReviews.map(r=>{
            const g=state.games.find(g=>g.id===r.gameId)||(state.apiGames||[]).find(g=>g.id===r.gameId);
            return(
              <div key={r.id} className="review-card" style={{cursor:'pointer'}} onClick={()=>navigate('game',{gameId:r.gameId})}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                  <div style={{fontSize:13,fontWeight:800}}>{g?`${abbr(g.away)} vs ${abbr(g.home)}`:'Game Review'}</div>
                  {g&&<span className={"sport-badge sc-"+g.sport} style={{['--sport-c']:getSportColor(g.sport)}}>{getSportMeta(g.sport).emoji} {getSportMeta(g.sport).label}</span>}
                </div>
                <Stars rating={r.rating} size={13}/>
                {r.text&&<p className="review-body" style={{marginTop:8}}>{r.text}</p>}
                <div style={{fontSize:11,color:'var(--text3)',marginTop:6}}>{formatDate(r.date)}</div>
                {r.videoUrl&&<VideoPreview url={r.videoUrl}/>}
              </div>
            );
          })}
      </div>
    </div>
  );
}

/* ── SEARCH PAGE ── */
function SearchPage({ state, navigate }) {
  const [sport,setSport]=useState(''),[league,setLeague]=useState(''),[ teamA,setTeamA]=useState(''),[ teamB,setTeamB]=useState(''),[ year,setYear]=useState(''),[ month,setMonth]=useState(''),[ results,setResults]=useState(null),[ focusA,setFocusA]=useState(false),[ focusB,setFocusB]=useState(false);
  const timerA=useRef(null),timerB=useRef(null);
  const teamPool=useMemo(()=>{let db=[];if(league&&TEAMS_DB[league])db=TEAMS_DB[league];else if(sport)db=[...new Set((LEAGUES[sport]||[]).flatMap(l=>TEAMS_DB[l.id]||[]))];else db=[...new Set(Object.values(TEAMS_DB).flat())];const gt=new Set();(sport?state.games.filter(g=>g.sport===sport):state.games).forEach(g=>{gt.add(g.home);gt.add(g.away);});return[...new Set([...db,...gt])].sort();},[state.games,sport,league]);
  const suggest=(val,exc)=>{const pool=teamPool.filter(t=>t!==exc);if(!val.trim())return pool.slice(0,7);return pool.filter(t=>t.toLowerCase().includes(val.toLowerCase())).slice(0,8);};
  const acA=useMemo(()=>focusA?suggest(teamA,teamB):[],[teamA,focusA,teamPool,teamB]);
  const acB=useMemo(()=>focusB?suggest(teamB,teamA):[],[teamB,focusB,teamPool,teamA]);
  const leagueOpts=sport?(LEAGUES[sport]||[]):[];
  useEffect(()=>{if(sport&&!leagueOpts.find(l=>l.id===league))setLeague('');},[sport]);
  const doSearch=()=>{
    const match=g=>{
      if(sport&&g.sport!==sport)return false;
      if(league&&g.league!==league&&g.sport!==league)return false;
      if(teamA){const q=teamA.toLowerCase();if(!g.home.toLowerCase().includes(q)&&!g.away.toLowerCase().includes(q))return false;}
      if(teamB){const q=teamB.toLowerCase();if(!g.home.toLowerCase().includes(q)&&!g.away.toLowerCase().includes(q))return false;}
      if(year&&!g.date.startsWith(String(year)))return false;
      if(month){const mi=MONTHS.indexOf(month)+1;if(parseInt(g.date.split('-')[1])!==mi)return false;}
      return true;
    };
    // Merge API games + DB games, dedup by home|away|date
    const apiMatches=(state.apiGames||[]).filter(match).sort((a,b)=>{const o={in:0,post:1,pre:2};return(o[a.status]||1)-(o[b.status]||1);});
    const apiKeys=new Set(apiMatches.map(g=>`${g.home}|${g.away}|${g.date}`));
    const dbMatches=state.games.filter(g=>match(g)&&!apiKeys.has(`${g.home}|${g.away}|${g.date}`)).sort((a,b)=>new Date(b.date)-new Date(a.date));
    setResults([...apiMatches,...dbMatches]);
  };
  const doClear=()=>{setSport('');setLeague('');setTeamA('');setTeamB('');setYear('');setMonth('');setResults(null);};
  const hasFilter=!!(sport||teamA||teamB||year||month);
  const sportColor=sport?getSportColor(sport):'var(--accent)';
  const AcList=({items,query,onPick,label})=>(<div className="ac-list"><div className="ac-hdr">{query?`${items.length} result${items.length!==1?'s':''}`:label}</div>{items.map(t=>{const q=query.toLowerCase(),idx=q?t.toLowerCase().indexOf(q):-1;return(<div key={t} className="ac-item" onMouseDown={e=>e.preventDefault()} onClick={()=>onPick(t)}><span>{idx>=0?<>{t.slice(0,idx)}<mark>{t.slice(idx,idx+query.length)}</mark>{t.slice(idx+query.length)}</>:t}</span><span style={{fontSize:12,color:'var(--text3)'}}>›</span></div>);})}</div>);
  return (
    <div className="page">
      <div className="search-hd"><div className="logo-desktop-hide"><BoxscoreLogo fontSize={22} style={{marginBottom:12}}/></div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:10}}>
          {SPORTS.filter(s=>s.id!=='all').map(s=><div key={s.id} className={`f-pill sc-${s.id}${sport===s.id?' active':''}`} style={{['--sport-c']:getSportColor(s.id)}} onClick={()=>setSport(sport===s.id?'':s.id)}>{s.emoji} {s.label}</div>)}
        </div>
        {leagueOpts.length>1&&<div style={{display:'flex',gap:7,flexWrap:'wrap',marginBottom:10}}>{leagueOpts.map(l=><div key={l.id} className={`f-pill${league===l.id?' active':''}`} onClick={()=>setLeague(league===l.id?'':l.id)}>{l.label}</div>)}</div>}
        <div style={{display:'flex',gap:8,marginBottom:10}}>
          <div className="team-ac-wrap" style={{flex:1}}>
            <input className="search-input" value={teamA} onChange={e=>setTeamA(e.target.value)} placeholder="Team or player…" onFocus={()=>setFocusA(true)} onBlur={()=>{timerA.current=setTimeout(()=>setFocusA(false),150);}}/>
            {acA.length>0&&<AcList items={acA} query={teamA} onPick={t=>{setTeamA(t);setFocusA(false);}} label="Suggestions"/>}
          </div>
          <div className="team-ac-wrap" style={{flex:1}}>
            <input className="search-input" value={teamB} onChange={e=>setTeamB(e.target.value)} placeholder="vs. opponent…" onFocus={()=>setFocusB(true)} onBlur={()=>{timerB.current=setTimeout(()=>setFocusB(false),150);}}/>
            {acB.length>0&&<AcList items={acB} query={teamB} onPick={t=>{setTeamB(t);setFocusB(false);}} label="Suggestions"/>}
          </div>
        </div>
        <div style={{display:'flex',gap:8,marginBottom:12}}>
          <input value={year} onChange={e=>setYear(e.target.value)} placeholder="Year" type="number" style={{flex:1}}/>
          <select value={month} onChange={e=>setMonth(e.target.value)} style={{flex:1}}><option value="">Month</option>{MONTHS.map(m=><option key={m}>{m}</option>)}</select>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-primary" style={{flex:1,background:sportColor,color:'#000'}} onClick={doSearch}>Search</button>
          {hasFilter&&<button className="btn btn-ghost btn-sm" onClick={doClear}>Clear</button>}
        </div>
      </div>
      <div style={{padding:'12px 16px 20px'}} className="gap-stack">
        {results===null?<div className="empty" style={{paddingTop:20}}><div className="empty-icon">🔍</div><p>Filter by sport, team,<br/>year, or month above</p></div>:results.length===0?<div className="empty"><div className="empty-icon">😕</div><p>No games match<br/>your search</p></div>:results.map(g=><GameCard key={g.id} game={g} reviews={state.reviews} onPress={()=>navigate('game',{gameId:g.id})}/>)}
      </div>
    </div>
  );
}

/* ── REVIEW SHEET ── */
const GRADES = ['A','B','C','D','F'];
const gradeColor = g => ({A:'#30d158',B:'#0a84ff',C:'#f0bf3d',D:'#ff9500',F:'#ff453a'}[g]||'#9898a8');

function ReviewSheet({ game, onClose, onSubmit, existing }) {
  const [rating,setRating]=useState(existing?.rating||0);
  const [text,setText]=useState(existing?.text||'');
  const [videoUrl,setVideoUrl]=useState(existing?.videoUrl||'');
  const [players,setPlayers]=useState(existing?.players||[]);
  const [playerName,setPlayerName]=useState('');
  const [roster,setRoster]=useState(null);
  const [rosterLoading,setRosterLoading]=useState(false);
  const [showSug,setShowSug]=useState(false);
  const color=getSportColor(game.sport);

  const loadRoster=useCallback(async()=>{
    if(rosterLoading)return;
    // If we already loaded a non-empty roster, skip
    if(roster!==null&&roster.length>0)return;
    const path=LEAGUE_PATHS[game.league]||LEAGUE_PATHS[game.sport]||null;
    if(!path||(!game.homeTeamId&&!game.awayTeamId)){setRoster([]);return;}
    setRosterLoading(true);
    const [away,home]=await Promise.all([fetchRoster(path,game.awayTeamId),fetchRoster(path,game.homeTeamId)]);
    const combined=[...new Set([...away,...home])];
    setRoster(combined);
    setRosterLoading(false);
  },[roster,rosterLoading,game]);

  const suggestions=useMemo(()=>{
    if(!roster||!playerName.trim()||!showSug)return[];
    return roster.filter(p=>p.toLowerCase().includes(playerName.toLowerCase())).slice(0,6);
  },[roster,playerName,showSug]);

  const addPlayer=(grade)=>{
    const name=playerName.trim();
    if(!name)return;
    setPlayers(prev=>[...prev,{name,grade}]);
    setPlayerName('');
    setShowSug(false);
  };

  return (
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="sheet">
        <div className="sheet-handle"/>
        <div style={{fontSize:17,fontWeight:800,marginBottom:4}}>{existing?'Edit Review':'Write a Review'}</div>
        <div style={{fontSize:13,color:'var(--text3)',marginBottom:20}}>{abbr(game.away)} vs {abbr(game.home)}</div>
        <div className="t-micro" style={{marginBottom:10,textAlign:'center'}}>Your Rating</div>
        <StarPicker rating={rating} onChange={setRating}/>
        <div className="t-micro" style={{margin:'16px 0 8px'}}>Your Review <span style={{textTransform:'none',letterSpacing:0,fontWeight:400,fontSize:11,color:'var(--text3)'}}>optional</span></div>
        <textarea rows={3} value={text} onChange={e=>setText(e.target.value)} placeholder="What made this game memorable?"/>
        <div className="t-micro" style={{margin:'14px 0 8px'}}>Player Spotlight <span style={{textTransform:'none',letterSpacing:0,fontWeight:400,fontSize:11,color:'var(--text3)'}}>optional · type name, tap grade</span></div>
        {players.length>0&&(
          <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:8}}>
            {players.map((p,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:6,background:'var(--s3)',border:'1px solid var(--border)',borderRadius:10,padding:'5px 10px'}}>
                <span style={{fontSize:13,fontWeight:700}}>{p.name}</span>
                <span style={{fontSize:12,fontWeight:900,color:gradeColor(p.grade),background:gradeColor(p.grade)+'22',borderRadius:5,padding:'1px 6px'}}>{p.grade}</span>
                <span onClick={()=>setPlayers(prev=>prev.filter((_,j)=>j!==i))} style={{fontSize:14,color:'var(--text3)',cursor:'pointer',lineHeight:1}}>×</span>
              </div>
            ))}
          </div>
        )}
        {players.length<6&&(
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <div style={{position:'relative',flex:1}}>
              <input value={playerName}
                onChange={e=>{setPlayerName(e.target.value);setShowSug(true);}}
                onFocus={()=>{loadRoster();setShowSug(true);}}
                onBlur={()=>setTimeout(()=>setShowSug(false),150)}
                onKeyDown={e=>e.key==='Enter'&&playerName.trim()&&addPlayer('A')}
                placeholder={rosterLoading?'Loading players…':'Player name…'}
                style={{width:'100%',height:36,padding:'0 12px',fontSize:14}}
              />
              {suggestions.length>0&&(
                <div className="ac-list" style={{position:'absolute',bottom:'calc(100% + 4px)',top:'auto',left:0,right:0,maxHeight:160,overflowY:'auto'}}>
                  {suggestions.map(name=>(
                    <div key={name} className="ac-item" onMouseDown={e=>e.preventDefault()} onClick={()=>{setPlayerName(name);setShowSug(false);}}>
                      {name}
                    </div>
                  ))}
                </div>
              )}
            </div>
            {GRADES.map(g=>(
              <button key={g} onClick={()=>addPlayer(g)} style={{width:34,height:34,borderRadius:8,border:'1.5px solid',borderColor:playerName.trim()?gradeColor(g):'var(--border)',background:playerName.trim()?gradeColor(g)+'18':'var(--s3)',color:playerName.trim()?gradeColor(g):'var(--text3)',fontWeight:900,fontSize:13,cursor:'pointer',flexShrink:0}}>
                {g}
              </button>
            ))}
          </div>
        )}
        <div className="t-micro" style={{margin:'14px 0 8px'}}>Clip URL <span style={{textTransform:'none',letterSpacing:0,fontWeight:400,fontSize:11,color:'var(--text3)'}}>optional</span></div>
        <input value={videoUrl} onChange={e=>setVideoUrl(e.target.value)} placeholder="YouTube link"/>
        <button className="btn btn-primary btn-full" style={{marginTop:20,opacity:rating?1:0.35,background:color,color:'#000'}} onClick={()=>rating&&onSubmit({rating,text,videoUrl,players})}>
          {existing?'Update Review':'Submit Review'}
        </button>
      </div>
    </div>
  );
}

        <div style={{fontSize:13,color:'var(--text3)',marginBottom:20}}>{abbr(game.away)} vs {abbr(game.home)}</div>
        <div className="t-micro" style={{marginBottom:8}}>Series Format</div>
        <div style={{display:'flex',gap:8,marginBottom:16}}>
          {['Best of 5','Best of 7'].map(t=>(
            <div key={t} onClick={()=>setSeriesType(t)} style={{flex:1,textAlign:'center',padding:'8px',borderRadius:10,border:'1.5px solid',borderColor:seriesType===t?'var(--accent)':'var(--border)',background:seriesType===t?'color-mix(in srgb,var(--accent) 12%,transparent)':'var(--s3)',color:seriesType===t?'var(--accent)':'var(--text3)',fontSize:13,fontWeight:700,cursor:'pointer'}}>

            <div style={{display:'flex',alignItems:'center',gap:12,justifyContent:'center'}}>

              <span style={{fontSize:40,fontWeight:900,minWidth:30,textAlign:'center'}}>{awayW}</span>
              <button onClick={()=>setAwayW(w=>w+1)} style={{width:36,height:36,borderRadius:18,border:'1.5px solid var(--border)',background:'var(--s3)',color:'var(--text)',fontSize:20,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
            </div>

          <div style={{fontSize:24,color:'var(--text3)',fontWeight:300,paddingTop:20}}>–</div>

            <div style={{display:'flex',alignItems:'center',gap:12,justifyContent:'center'}}>
              <button onClick={()=>setHomeW(w=>Math.max(0,w-1))} style={{width:36,height:36,borderRadius:18,border:'1.5px solid var(--border)',background:'var(--s3)',color:'var(--text)',fontSize:20,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>−</button>
              <span style={{fontSize:40,fontWeight:900,minWidth:30,textAlign:'center'}}>{homeW}</span>
              <button onClick={()=>setHomeW(w=>w+1)} style={{width:36,height:36,borderRadius:18,border:'1.5px solid var(--border)',background:'var(--s3)',color:'var(--text)',fontSize:20,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
            </div>
          </div>
        </div>
        <button className="btn btn-primary btn-full" onClick={()=>onSave({awaySeriesWins:awayW,homeSeriesWins:homeW,seriesType,isPlayoff:true})}>
          Save Series Score
        </button>
        <button className="btn btn-ghost btn-full" style={{marginTop:8}} onClick={()=>onSave({awaySeriesWins:null,homeSeriesWins:null,seriesType:'',isPlayoff:false})}>
          Remove Series Info
        </button>
      </div>
    </div>
  );
}

/* ── GAME DETAIL PAGE ── */
function GamePage({ gameId, state, dispatch, navigate, showToast }) {
  const [showReview,setShowReview]=useState(false);
  const [showSeriesEditor,setShowSeriesEditor]=useState(false);
  const [showAddToList,setShowAddToList]=useState(false);
  const [reviewSort,setReviewSort]=useState('recent');
  const [showVidIdx,setShowVidIdx]=useState(null);
  const _dbGame=state.games.find(g=>g.id===gameId);
  const _apiGame=(state.apiGames||[]).find(g=>g.id===gameId);
  const game=_dbGame&&_apiGame
    ?{..._dbGame,homeTeamId:_dbGame.homeTeamId||_apiGame.homeTeamId,awayTeamId:_dbGame.awayTeamId||_apiGame.awayTeamId,homeScore:_apiGame.homeScore??_dbGame.homeScore,awayScore:_apiGame.awayScore??_dbGame.awayScore,status:_apiGame.status||_dbGame.status}
    :(_dbGame||_apiGame);
  if(!game)return <div style={{padding:32,textAlign:'center',color:'var(--text3)'}}>Game not found</div>;
  const reviews=state.reviews.filter(r=>r.gameId===gameId);
  const avg=avgRating(reviews), inWL=state.watchlist.includes(gameId);
  const myReview=reviews.find(r=>r.userId===state.currentUser.id);
  const color=getSportColor(game.sport), meta=getSportMeta(game.sport);
  const awayWins=game.awayScore>game.homeScore, homeWins=game.homeScore>game.awayScore;
  const toggleWL=()=>{dispatch({type:inWL?'REMOVE_WATCHLIST':'ADD_WATCHLIST',gameId});showToast(inWL?'Removed from saved':'✓ Saved');};
  const submitReview=async({rating,text,videoUrl,players})=>{
    const ok=await dispatch({type:'ADD_REVIEW',game,review:{id:'r_'+Date.now(),gameId,userId:state.currentUser.id,user:state.currentUser.name,rating,text,videoUrl,players:players||[],date:new Date().toISOString().split('T')[0]}});
    setShowReview(false);
    showToast(ok===true?'✓ Review saved!':`❌ ${(ok&&ok.error)||'Could not save review — please try again'}`);
  };
  const videos=[...(game.videoUrl?[{url:game.videoUrl,label:'Game Highlights'}]:[]),...reviews.filter(r=>r.videoUrl).map(r=>({url:r.videoUrl,label:`${r.user}'s clip`}))];
  const saveSeries=async({awaySeriesWins,homeSeriesWins,seriesType,isPlayoff})=>{
    dispatch({type:'UPDATE_GAME_SERIES',gameId,awaySeriesWins,homeSeriesWins,seriesType,isPlayoff});
    setShowSeriesEditor(false);showToast('✓ Series score updated');
  };
  return (
    <div className="page">
      <div className="detail-hd">
        <div className="back-btn" onClick={()=>navigate('home')}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg> Back</div>
      </div>
      <div className="detail-sport-bar" style={{['--sport-c']:color}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
          <span className={`sport-badge sc-${game.sport}`} style={{['--sport-c']:color}}>{meta.emoji} {meta.label}</span>
          {game.status==='in'&&<span className="live-badge"><span className="live-dot"/>LIVE</span>}
          <span style={{fontSize:12,color:'var(--text3)'}}>{game.datetime?gameDateLabel(game):formatDate(game.date)}</span>
          {game.venue&&<span style={{fontSize:12,color:'var(--text3)'}}>· {game.venue}</span>}
        </div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          {avg>0?<div style={{display:'flex',alignItems:'center',gap:6}}><Stars rating={avg} size={14}/><span style={{fontSize:13,color:'var(--text2)',fontWeight:600}}>{avg.toFixed(1)} ({reviews.length})</span></div>:<span style={{fontSize:12,color:'var(--text3)'}}>No reviews yet</span>}
          <div style={{display:'flex',gap:6}}>
            <button className="wl-btn" onClick={()=>setShowAddToList(true)}>📋 List</button>
            <button className={`wl-btn${inWL?' saved':''}`} onClick={toggleWL}>{inWL?'✓ Saved':'☆ Save'}</button>
          </div>
        </div>
      </div>
      <div className="detail-matchup">
        <div className="detail-team-col">
          <TeamLogo name={game.away} sport={game.sport} size={56} espnId={game.awayTeamId}/>
          <div className="detail-team-abbr" style={{color:awayWins?'var(--text)':'var(--text2)',marginTop:10}}>{abbr(game.away)}</div>
          <div className="detail-team-name">{game.away}</div>
        </div>
        <div className="detail-score-mid">
          {game.awayScore!==undefined?<div className="detail-score">{game.awayScore}–{game.homeScore}</div>:<div className="detail-vs">vs</div>}
        </div>
        <div className="detail-team-col">
          <TeamLogo name={game.home} sport={game.sport} size={56} espnId={game.homeTeamId}/>
          <div className="detail-team-abbr" style={{color:homeWins?'var(--text)':'var(--text2)',marginTop:10}}>{abbr(game.home)}</div>

        </div>
      </div>
      {(game.homeSeriesWins!==null&&game.awaySeriesWins!==null)&&(

            const headline=tied?`Series tied ${game.awaySeriesWins}-${game.homeSeriesWins}`:awayLeads?`${abbr(game.away)} leads the series`:` ${abbr(game.home)} leads the series`;

                  <div style={{fontSize:48,fontWeight:900,color:awayLeads?leaderColor:loserColor,lineHeight:1}}>{game.awaySeriesWins}</div>
                  {awayLeads&&<div style={{fontSize:9,fontWeight:700,color:'var(--accent)',marginTop:4,textTransform:'uppercase',letterSpacing:0.5}}>leads</div>}
                </div>
                <div style={{color:'var(--text3)',fontSize:22,fontWeight:200}}>–</div>
                <div style={{flex:1,textAlign:'center'}}>
                  <div style={{fontSize:14,fontWeight:800,color:homeLeads?'var(--text)':'var(--text2)',marginBottom:4}}>{abbr(game.home)}</div>
                  <div style={{fontSize:48,fontWeight:900,color:homeLeads?leaderColor:loserColor,lineHeight:1}}>{game.homeSeriesWins}</div>
                  {homeLeads&&<div style={{fontSize:9,fontWeight:700,color:'var(--accent)',marginTop:4,textTransform:'uppercase',letterSpacing:0.5}}>leads</div>}
                </div>
              </div>
            </>);
          })()}
          <button className="btn btn-ghost btn-sm" style={{margin:'8px auto 0',display:'flex',fontSize:11}} onClick={()=>setShowSeriesEditor(true)}>✏️ Edit</button>
        </div>
      )}
      {!(game.homeSeriesWins!==null&&game.awaySeriesWins!==null)&&(game.awayRecord||game.homeRecord||game.seriesInfo)&&(
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 20px 8px',gap:8}}>
          <span style={{fontSize:12,color:'var(--text3)',flex:1,textAlign:'center'}}>{game.awayRecord||''}</span>
          {game.seriesInfo&&<span style={{fontSize:11,fontWeight:700,color:'var(--accent)',background:'color-mix(in srgb,var(--accent) 12%,transparent)',borderRadius:20,padding:'2px 10px',flexShrink:0}}>{game.seriesInfo}</span>}
          <span style={{fontSize:12,color:'var(--text3)',flex:1,textAlign:'center'}}>{game.homeRecord||''}</span>
        </div>
      )}
      <div style={{display:'flex',justifyContent:'center',paddingBottom:4}}>
        <button className="btn btn-ghost btn-sm" style={{fontSize:11,gap:4}} onClick={()=>setShowSeriesEditor(true)}>
          🏆 {game.isPlayoff?'Edit Series Score':'+ Add Series Score'}
        </button>
      </div>
      <div style={{padding:'0 16px'}}>
        {game.description&&<p style={{fontSize:14,color:'var(--text2)',lineHeight:1.6,marginTop:14}}>{game.description}</p>}
        {(game.tags||[]).length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:12}}>{game.tags.map(t=><span key={t} className="tag-chip">#{t}</span>)}</div>}
      </div>
      <div style={{height:1,background:'var(--border)',margin:'16px 0'}}/>
      {videos.length>0&&(
        <div style={{padding:'0 16px 0'}}>
          <div style={{fontSize:15,fontWeight:800,marginBottom:14}}>📼 Archive</div>
          <div className="gap-stack">
            {videos.map((v,i)=>{const ytId=getYtId(v.url);if(!ytId)return null;return showVidIdx===i?(<div key={i}><div style={{fontSize:11,color:'var(--text3)',marginBottom:6}}>{v.label}</div><div className="vid-embed"><iframe src={`https://www.youtube.com/embed/${ytId}?autoplay=1`} allowFullScreen allow="autoplay"/></div></div>):(<div key={i} className="vid-thumb" onClick={()=>setShowVidIdx(i)}><img src={`https://img.youtube.com/vi/${ytId}/mqdefault.jpg`} alt={v.label} onError={e=>e.target.style.display='none'}/><div className="vid-play-btn">▶</div><div className="vid-label">{v.label}</div></div>);})}
          </div>
        </div>
      )}
      <div style={{padding:'20px 16px 0'}}>
        {reviews.length>0&&(
          <div style={{background:'var(--s2)',border:'1px solid var(--border)',borderRadius:14,padding:'12px 14px',marginBottom:14}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
              <div style={{fontSize:30,fontWeight:900,color:'var(--accent)',lineHeight:1}}>{avgRating(reviews).toFixed(1)}</div>
              <div><Stars rating={avgRating(reviews)} size={16}/><div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{reviews.length} review{reviews.length!==1?'s':''}</div></div>
            </div>
            {[5,4,3,2,1].map(star=>{const cnt=reviews.filter(r=>Math.round(r.rating)===star).length;const pct=reviews.length?Math.round(cnt/reviews.length*100):0;return(
              <div key={star} style={{display:'flex',alignItems:'center',gap:8,marginBottom:3}}>
                <span style={{fontSize:10,color:'var(--text3)',width:10,textAlign:'right',flexShrink:0}}>{star}</span>
                <div style={{flex:1,height:5,background:'var(--s3)',borderRadius:3,overflow:'hidden'}}>
                  <div style={{width:pct+'%',height:'100%',background:'var(--accent)',borderRadius:3}}/>
                </div>
                <span style={{fontSize:10,color:'var(--text3)',width:16,textAlign:'right',flexShrink:0}}>{cnt}</span>
              </div>
            );})}
          </div>

        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <div style={{fontSize:15,fontWeight:800}}>Reviews</div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            {reviews.length>1&&<select value={reviewSort} onChange={e=>setReviewSort(e.target.value)} style={{background:'var(--s3)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text2)',fontSize:12,padding:'4px 8px',width:'auto'}}>
              <option value="recent">Recent</option>
              <option value="top">Top rated</option>
              <option value="low">Lowest</option>

            <button className="btn btn-ghost btn-sm" onClick={()=>setShowReview(true)}>{myReview?'✏️ Edit':'+ Write'}</button>
