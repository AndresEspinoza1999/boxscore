function abbr(name) { return ABBR_MAP[name] || name.split(' ').map(w=>w[0]).join('').slice(0,3).toUpperCase(); }

function getLogoUrl(name, sport, espnId=null) {
  // If we have a direct ESPN team ID (from API), use it
  if (espnId) {
    if (['nba','nfl','mlb','nhl'].includes(sport)) return `https://a.espncdn.com/i/teamlogos/${sport}/500/${espnId}.png`;
    return `https://a.espncdn.com/i/teamlogos/soccer/500/${espnId}.png`;
  }
  if (['nba','nfl','mlb','nhl'].includes(sport)) {
    const a = (ABBR_MAP[name] || name.split(' ').map(w=>w[0]).join('').slice(0,3)).toLowerCase();
    return `https://a.espncdn.com/i/teamlogos/${sport}/500/${a}.png`;
  }
  if (sport === 'soccer') { const id = SOCCER_LOGO_IDS[name]; if (id) return `https://a.espncdn.com/i/teamlogos/soccer/500/${id}.png`; }
  return null;
}

function TeamLogo({ name, sport, size=28, espnId=null }) {
  const [failed, setFailed] = useState(false);
  const color = getSportColor(sport);
  const url = !failed ? getLogoUrl(name, sport, espnId) : null;
  const r = Math.round(size * 0.22);
  if (!url) return (
    <div style={{width:size,height:size,borderRadius:r,background:`${color}18`,border:`1.5px solid ${color}38`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:Math.round(size*0.3),fontWeight:900,color,letterSpacing:'-0.5px',fontFamily:'inherit',lineHeight:1}}>
      {abbr(name).slice(0,2)}
    </div>
  );
  return <img src={url} alt={name} width={size} height={size} style={{borderRadius:r,flexShrink:0,objectFit:'contain',display:'block'}} onError={()=>setFailed(true)}/>;
}

/* ── ESPN API ── */
const SPORT_PARENT = {nba:'nba',nfl:'nfl',mlb:'mlb',nhl:'nhl',mls:'soccer',epl:'soccer',laliga:'soccer',ucl:'soccer',seriea:'soccer',bundesliga:'soccer',ligue1:'soccer'};
const LEAGUE_LABELS = {mls:'MLS',epl:'Premier League',laliga:'La Liga',ucl:'UCL',seriea:'Serie A',bundesliga:'Bundesliga',ligue1:'Ligue 1',nba:'NBA',nfl:'NFL',mlb:'MLB',nhl:'NHL'};
const LEAGUE_PATHS = {
  nba:'basketball/nba', nfl:'american-football/nfl', mlb:'baseball/mlb', nhl:'hockey/nhl',
  epl:'soccer/eng.1', laliga:'soccer/esp.1', ucl:'soccer/uefa.champions',
  seriea:'soccer/ita.1', bundesliga:'soccer/ger.1', ligue1:'soccer/fra.1', mls:'soccer/usa.1',
};
async function fetchLeagueGames(sportKey) {
  const path = LEAGUE_PATHS[sportKey]; if(!path) return [];
  try {
    const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${path}/scoreboard`);
    const data = await res.json();
    return (data.events||[]).map(ev=>parseEspnEvent(ev,sportKey));
  } catch(e){ return []; }
}
async function fetchRecentLeagueGames(sportKey, count=10, daysBack=14) {
  const path = LEAGUE_PATHS[sportKey]; if(!path) return [];
  // Build array of date strings: today going back daysBack days
  const now = new Date();
  const dateStrs = Array.from({length:daysBack+1},(_,i)=>{
    const d=new Date(now.getTime()-i*86400000);
    return d.toISOString().split('T')[0].replace(/-/g,'');
  });
  try {
    const results = await Promise.all(dateStrs.map(async date=>{
      try {
        const res=await fetch(`https://site.api.espn.com/apis/site/v2/sports/${path}/scoreboard?dates=${date}`);
        const data=await res.json();
        return (data.events||[]).map(ev=>parseEspnEvent(ev,sportKey));
      } catch(e){ return []; }
    }));
    const seen=new Set();
    return results.flat()
      .filter(g=>{ if(seen.has(g.apiId))return false; seen.add(g.apiId); return true; })
      .sort((a,b)=>new Date(b.datetime||b.date)-new Date(a.datetime||a.date))
      .slice(0,count);
  } catch(e){ return []; }
}

function parseEspnEvent(ev, sportKey) {
  const comp=ev.competitions?.[0]||{}, comps=comp.competitors||[];
  const home=comps.find(c=>c.homeAway==='home')||comps[0]||{};
  const away=comps.find(c=>c.homeAway==='away')||comps[1]||{};
  const status=comp.status||{}, st=status.type?.state||'pre';
  // Series / playoff data
  const series=comp.series||null;
  const seriesType=series?.type?.text||''; // "Best of 7"
  const seriesSummary=series?.summary||'';
  // ESPN puts per-team wins in series.competitors array
  const seriesComps=series?.competitors||[];
  const homeSeriesComp=seriesComps.find(c=>c.id===home.team?.id)||null;
  const awaySeriesComp=seriesComps.find(c=>c.id===away.team?.id)||null;
  const homeSeriesWins=homeSeriesComp?parseInt(homeSeriesComp.wins||0):null;
  const awaySeriesWins=awaySeriesComp?parseInt(awaySeriesComp.wins||0):null;
  const isPlayoff=!!(series||comp.notes?.some(n=>n.type==='event'&&/playoff|postseason|round/i.test(n.headline||'')));
  const roundText=comp.notes?.find(n=>n.type==='event')?.headline||'';
  const seriesInfo=seriesSummary||(isPlayoff&&roundText?roundText:'');
  return {
    fromApi:true, apiId:ev.id, id:'api_'+ev.id, sport:SPORT_PARENT[sportKey]||sportKey, league:sportKey,
    home:home.team?.displayName||'', away:away.team?.displayName||'',
    home_abbr:home.team?.abbreviation||'', away_abbr:away.team?.abbreviation||'',
    homeScore:st!=='pre'?parseInt(home.score||0):undefined,
    awayScore:st!=='pre'?parseInt(away.score||0):undefined,
    homeTeamId:home.team?.id, awayTeamId:away.team?.id,
    venue:comp.venue?.fullName||'', date:ev.date?.split('T')[0]||'',
    datetime:ev.date, status:st, statusDetail:status.type?.shortDetail||'',
    period:status.period, clock:status.displayClock,
    homeRecord:home.records?.[0]?.summary||'', awayRecord:away.records?.[0]?.summary||'',
    seriesInfo, seriesType, homeSeriesWins, awaySeriesWins, isPlayoff,
    tags:[], description:'', videoUrl:'',
  };
}
function gameDateLabel(game) {
  if(!game.datetime&&!game.date) return '';
  if(game.status==='in') return game.statusDetail||'LIVE';
  const d=new Date(game.datetime||game.date), now=new Date();
  const isToday=d.toDateString()===now.toDateString();
  const isTomorrow=new Date(now.getTime()+86400000).toDateString()===d.toDateString();
  const timeStr=game.datetime?d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZone:'America/New_York'})+' ET':'';
  if(game.status==='post') return isToday?'Final':MONTHS[d.getMonth()]+' '+d.getDate()+' · Final';
  if(isToday) return timeStr?'Today · '+timeStr:'Today';
  if(isTomorrow) return timeStr?'Tomorrow · '+timeStr:'Tomorrow';
  return MONTHS[d.getMonth()]+' '+d.getDate()+(timeStr?' · '+timeStr:'');
}

/* ── UTILS ── */
function avgRating(reviews) { return reviews.length ? reviews.reduce((a,b)=>a+b.rating,0)/reviews.length : 0; }
function formatDate(d)  { return d ? new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : ''; }
function formatShort(d) { return d ? new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'}) : ''; }
function getYtId(url) { if(!url)return null; const m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([A-Za-z0-9_-]{11})/); return m?m[1]:null; }
function getSportColor(sport) { return SPORT_COLORS[sport]||'#f0bf3d'; }
function getSportMeta(sport)  { return SPORTS.find(s=>s.id===sport)||SPORTS[0]; }

function VideoPreview({ url }) {
  const [open, setOpen] = useState(false);
  const ytId = getYtId(url);
  if (!ytId) return <a href={url} target="_blank" rel="noreferrer" className="review-video-link">📼 View clip</a>;
  if (open) return (
    <div className="vid-embed" style={{marginTop:8}}>
      <iframe src={`https://www.youtube.com/embed/${ytId}?autoplay=1`} allowFullScreen allow="autoplay"/>
    </div>
  );
  return (
    <div className="vid-thumb" style={{marginTop:8}} onClick={()=>setOpen(true)}>
      <img src={`https://img.youtube.com/vi/${ytId}/mqdefault.jpg`} alt="Video clip" onError={e=>e.target.style.display='none'}/>
      <div className="vid-play-btn">▶</div>
      <div className="vid-label">▶ Play clip</div>
    </div>
  );
}

function Stars({ rating, size=13 }) {
  const full=Math.floor(rating), half=rating-full>=0.5;
  return <span className="stars">{[1,2,3,4,5].map(i=><span key={i} className={i<=full?'star-f':half&&i===full+1?'star-f':'star-e'} style={{fontSize:size}}>{i<=full?'★':half&&i===full+1?'⯨':'☆'}</span>)}</span>;
}

    <div className={`game-card sc-${game.sport}`} style={{['--sport-c']:color}} onClick={onPress}>

  useEffect(()=>{
    async function load() {

        sb.from('profiles').select('*').eq('id',userId).single(),

      ]);

      setUserReviews((rR.data||[]).map(normalizeReview));

  const [sport,setSport]=useState(''),[league,setLeague]=useState(''),[ teamA,setTeamA]=useState(''),[ teamB,setTeamB]=useState(''),[ year,setYear]=useState(''),[ month,setMonth]=useState(''),[ results,setResults]=useState(null),[ focusA,setFocusA]=useState(false),[ focusB,setFocusB]=useState(false);

  const teamPool=useMemo(()=>{let db=[];if(league&&TEAMS_DB[league])db=TEAMS_DB[league];else if(sport)db=[...new Set((LEAGUES[sport]||[]).flatMap(l=>TEAMS_DB[l.id]||[]))];else db=[...new Set(Object.values(TEAMS_DB).flat())];const gt=new Set();(sport?state.games.filter(g=>g.sport===sport):state.games).forEach(g=>{gt.add(g.home);gt.add(g.away);});return[...new Set([...db,...gt])].sort();},[state.games,sport,league]);
  const suggest=(val,exc)=>{const pool=teamPool.filter(t=>t!==exc);if(!val.trim())return pool.slice(0,7);return pool.filter(t=>t.toLowerCase().includes(val.toLowerCase())).slice(0,8);};
  const acA=useMemo(()=>focusA?suggest(teamA,teamB):[],[teamA,focusA,teamPool,teamB]);
  const acB=useMemo(()=>focusB?suggest(teamB,teamA):[],[teamB,focusB,teamPool,teamA]);
  const leagueOpts=sport?(LEAGUES[sport]||[]):[];
  useEffect(()=>{if(sport&&!leagueOpts.find(l=>l.id===league))setLeague('');},[sport]);
  const doSearch=()=>{
    const match=g=>{
      if(sport&&g.sport!==sport)return false;
      if(league&&g.league!==league&&g.sport!==league)return false;
      if(teamA){const q=teamA.toLowerCase();if(!g.home.toLowerCase().includes(q)&&!g.away.toLowerCase().includes(q))return false;}
      if(teamB){const q=teamB.toLowerCase();if(!g.home.toLowerCase().includes(q)&&!g.away.toLowerCase().includes(q))return false;}
      if(year&&!g.date.startsWith(String(year)))return false;
      if(month){const mi=MONTHS.indexOf(month)+1;if(parseInt(g.date.split('-')[1])!==mi)return false;}
      return true;
    };
    // Merge API games + DB games, dedup by home|away|date
    const apiMatches=(state.apiGames||[]).filter(match).sort((a,b)=>{const o={in:0,post:1,pre:2};return(o[a.status]||1)-(o[b.status]||1);});
    const apiKeys=new Set(apiMatches.map(g=>`${g.home}|${g.away}|${g.date}`));
    const dbMatches=state.games.filter(g=>match(g)&&!apiKeys.has(`${g.home}|${g.away}|${g.date}`)).sort((a,b)=>new Date(b.date)-new Date(a.date));
    setResults([...apiMatches,...dbMatches]);
  };
  const doClear=()=>{setSport('');setLeague('');setTeamA('');setTeamB('');setYear('');setMonth('');setResults(null);};
  const hasFilter=!!(sport||teamA||teamB||year||month);
  const sportColor=sport?getSportColor(sport):'var(--accent)';
  const AcList=({items,query,onPick,label})=>(<div className="ac-list"><div className="ac-hdr">{query?`${items.length} result${items.length!==1?'s':''}`:label}</div>{items.map(t=>{const q=query.toLowerCase(),idx=q?t.toLowerCase().indexOf(q):-1;return(<div key={t} className="ac-item" onMouseDown={e=>e.preventDefault()} onClick={()=>onPick(t)}><span>{idx>=0?<>{t.slice(0,idx)}<mark>{t.slice(idx,idx+query.length)}</mark>{t.slice(idx+query.length)}</>:t}</span><span style={{fontSize:12,color:'var(--text3)'}}>›</span></div>);})}</div>);
  return (
    <div className="page">
      <div className="search-hd"><div className="app-logo" style={{fontSize:20,marginBottom:12,gap:5}}><svg width="17" height="14" viewBox="0 0 22 18" fill="none" style={{flexShrink:0}}><rect x="0.75" y="0.75" width="20.5" height="16.5" rx="3.75" fill="#0a84ff" fillOpacity="0.12" stroke="#0a84ff" strokeWidth="1.5"/><rect x="4" y="4.5" width="6" height="2" rx="1" fill="#0a84ff"/><rect x="14" y="4.5" width="4" height="2" rx="1" fill="#0a84ff"/><rect x="4" y="11.5" width="7" height="2" rx="1" fill="white" fillOpacity="0.35"/><rect x="14" y="11.5" width="4" height="2" rx="1" fill="white" fillOpacity="0.35"/></svg>BOXSCORE</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:10}}>
          {SPORTS.filter(s=>s.id!=='all').map(s=><div key={s.id} className={`f-pill sc-${s.id}${sport===s.id?' active':''}`} style={{['--sport-c']:getSportColor(s.id)}} onClick={()=>setSport(sport===s.id?'':s.id)}>{s.emoji} {s.label}</div>)}
        </div>
        {leagueOpts.length>1&&<div style={{display:'flex',gap:7,flexWrap:'wrap',marginBottom:10}}>{leagueOpts.map(l=><div key={l.id} className={`f-pill${league===l.id?' active':''}`} onClick={()=>setLeague(league===l.id?'':l.id)}>{l.label}</div>)}</div>}
        <div style={{display:'flex',gap:8,marginBottom:10}}>
          <div className="team-ac-wrap" style={{flex:1}}>
            <input className="search-input" value={teamA} onChange={e=>setTeamA(e.target.value)} placeholder="Team or player…" onFocus={()=>setFocusA(true)} onBlur={()=>{timerA.current=setTimeout(()=>setFocusA(false),150);}}/>
            {acA.length>0&&<AcList items={acA} query={teamA} onPick={t=>{setTeamA(t);setFocusA(false);}} label="Suggestions"/>}
          </div>
          <div className="team-ac-wrap" style={{flex:1}}>
            <input className="search-input" value={teamB} onChange={e=>setTeamB(e.target.value)} placeholder="vs. opponent…" onFocus={()=>setFocusB(true)} onBlur={()=>{timerB.current=setTimeout(()=>setFocusB(false),150);}}/>
            {acB.length>0&&<AcList items={acB} query={teamB} onPick={t=>{setTeamB(t);setFocusB(false);}} label="Suggestions"/>}
          </div>
        </div>
        <div style={{display:'flex',gap:8,marginBottom:12}}>
          <input value={year} onChange={e=>setYear(e.target.value)} placeholder="Year" type="number" style={{flex:1}}/>

        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-primary" style={{flex:1,background:sportColor,color:'#000'}} onClick={doSearch}>Search</button>

        </div>

      <div style={{padding:'12px 16px 20px'}} className="gap-stack">
        {results===null?<div className="empty" style={{paddingTop:20}}><div className="empty-icon">🔍</div><p>Filter by sport, team,<br/>year, or month above</p></div>:results.length===0?<div className="empty"><div className="empty-icon">😕</div><p>No games match<br/>your search</p></div>:results.map(g=><GameCard key={g.id} game={g} reviews={state.reviews} onPress={()=>navigate('game',{gameId:g.id})}/>)}

  );

            </div>

                <span style={{fontSize:10,color:'var(--text3)',width:10,textAlign:'right',flexShrink:0}}>{star}</span>
                <div style={{flex:1,height:5,background:'var(--s3)',borderRadius:3,overflow:'hidden'}}>
                  <div style={{width:pct+'%',height:'100%',background:'var(--accent)',borderRadius:3}}/>
                </div>
                <span style={{fontSize:10,color:'var(--text3)',width:16,textAlign:'right',flexShrink:0}}>{cnt}</span>
              </div>
            );})}
          </div>
        )}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <div style={{fontSize:15,fontWeight:800}}>Reviews</div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            {reviews.length>1&&<select value={reviewSort} onChange={e=>setReviewSort(e.target.value)} style={{background:'var(--s3)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text2)',fontSize:12,padding:'4px 8px',width:'auto'}}>
              <option value="recent">Recent</option>
              <option value="top">Top rated</option>
              <option value="low">Lowest</option>
            </select>}
            <button className="btn btn-ghost btn-sm" onClick={()=>setShowReview(true)}>{myReview?'✏️ Edit':'+ Write'}</button>
          </div>
        </div>
        {reviews.length===0?<div className="empty" style={{paddingTop:24}}><div className="empty-icon">💬</div><p>Be the first to review this game</p></div>:(
          <div className="gap-stack" style={{paddingBottom:20}}>
            {[...reviews].sort((a,b)=>reviewSort==='top'?b.rating-a.rating:reviewSort==='low'?a.rating-b.rating:new Date(b.date)-new Date(a.date)).map(r=>(
              <div key={r.id} className="review-card">
                <div className="review-card-top">
                  <div><div className="reviewer-name" onClick={r.userId!==state.currentUser.id?()=>navigate('public_profile',{userId:r.userId,username:r.user}):undefined} style={r.userId!==state.currentUser.id?{cursor:'pointer',color:'var(--accent)'}:{}}>{r.userId===state.currentUser.id?<span style={{color:'var(--accent)'}}>⭐ {state.currentUser.name}</span>:r.user}</div><Stars rating={r.rating} size={12}/></div>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span className="review-date">{formatDate(r.date)}</span>
                    {r.userId===state.currentUser.id&&<button onClick={()=>{if(window.confirm('Delete your review?')){dispatch({type:'DELETE_REVIEW',reviewId:r.id});showToast('Review deleted');}}} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text3)',fontSize:14}}>🗑</button>}
                  </div>
                </div>
                <p className="review-body">{r.text}</p>
                {r.players&&r.players.length>0&&(
                  <div style={{display:'flex',flexWrap:'wrap',gap:5,marginTop:8}}>
                    {r.players.map((p,i)=>(
                      <div key={i} style={{display:'inline-flex',alignItems:'center',gap:5,background:'var(--s3)',border:'1px solid var(--border)',borderRadius:8,padding:'3px 9px'}}>
                        <span style={{fontSize:12,fontWeight:700,color:'var(--text2)'}}>{p.name}</span>
                        <span style={{fontSize:11,fontWeight:900,color:gradeColor(p.grade)}}>{p.grade}</span>
                      </div>
                    ))}
                  </div>
                )}
                {r.videoUrl&&<VideoPreview url={r.videoUrl}/>}
                <LikeBtn reviewId={r.id} likes={r.likes} currentUserId={state.currentUser.id} onToggle={id=>dispatch({type:'TOGGLE_LIKE',reviewId:id})}/>
              </div>
            ))}
          </div>
        )}
      </div>
      {showReview&&<ReviewSheet game={game} existing={myReview} onClose={()=>setShowReview(false)} onSubmit={submitReview}/>}
      {showSeriesEditor&&<SeriesEditor game={game} onSave={saveSeries} onClose={()=>setShowSeriesEditor(false)}/>}
    </div>
  );
}

/* ── ADD GAME SHEET ── */
function AddGameSheet({ onClose, onSelect }) {

  const [apiGames,setApiGames]=useState([]);
  const [loading,setLoading]=useState(true);
  const [query,setQuery]=useState('');

  const [league,setLeague]=useState('');
  const activeLeague = sport==='soccer'?(league||'epl'):sport;
  useEffect(()=>{ setLeague(''); },[sport]);
  useEffect(()=>{
    setLoading(true); setApiGames([]);
    fetchLeagueGames(activeLeague).then(gs=>{setApiGames(gs);setLoading(false);});
  },[activeLeague]);

  const filtered=query.trim()?apiGames.filter(g=>g.home.toLowerCase().includes(query.toLowerCase())||g.away.toLowerCase().includes(query.toLowerCase())):apiGames;

  return (
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="sheet">

        <div style={{fontSize:18,fontWeight:800,marginBottom:14}}>Find a Game</div>
        <div className="sport-scroll" style={{padding:'0 0 8px',margin:'0 -16px',paddingLeft:16}}>
          {SPORTS.filter(s=>s.id!=='all').map(s=>(
            <div key={s.id} className={`f-pill sc-${s.id}${sport===s.id?' active':''}`} style={{['--sport-c']:getSportColor(s.id)}} onClick={()=>setSport(s.id)}>
              {s.emoji} {s.label}
            </div>
          ))}
        </div>
        {sport==='soccer'&&(
          <div className="sport-scroll" style={{padding:'0 0 10px',margin:'0 -16px',paddingLeft:16}}>
            {[{id:'epl',label:'Premier League'},{id:'laliga',label:'La Liga'},{id:'mls',label:'MLS'},{id:'ucl',label:'UCL'},{id:'seriea',label:'Serie A'},{id:'bundesliga',label:'Bundesliga'}].map(l=>(
              <div key={l.id} className={`f-pill sc-${l.id}${(league||'epl')===l.id?' active':''}`} style={{['--sport-c']:getSportColor('soccer')}} onClick={()=>setLeague(l.id)}>

          <div style={{display:'flex',justifyContent:'center',padding:32}}><div className="spinner"/></div>
        ):filtered.length===0?(
          <div className="empty"><div className="empty-icon">🏟️</div><p>No games found today</p></div>

          <div className="gap-stack" style={{maxHeight:'55vh',overflowY:'auto',paddingBottom:8}}>

              <div key={g.id} className="game-card" style={{['--sport-c']:getSportColor(g.sport)}} onClick={()=>onSelect(g)}>
                <div className="gc-head">

                  <span className="gc-meta">{g.status==='in'?<span className="live-badge"><span className="live-dot"/>LIVE {g.statusDetail}</span>:gameDateLabel(g)}</span>
                </div>
                <div className="gc-body">
                  <div className={`gc-team-row${g.awayScore!==undefined&&g.awayScore>g.homeScore?' winner':''}`}>
                    <TeamLogo name={g.away} sport={g.sport} size={22} espnId={g.awayTeamId}/>
                    <span className="gc-fullname">{g.away}</span>
                    {g.awayScore!==undefined&&<span className="gc-score">{g.awayScore}</span>}
                    {g.awayScore!==undefined&&g.awayScore>g.homeScore&&<span className="gc-win-dot"/>}
                  </div>
                  <div className={`gc-team-row${g.homeScore!==undefined&&g.homeScore>g.awayScore?' winner':''}`}>

                    {g.homeScore!==undefined&&<span className="gc-score">{g.homeScore}</span>}
                    {g.homeScore!==undefined&&g.homeScore>g.awayScore&&<span className="gc-win-dot"/>}

              </div>
            ))}
          </div>
        )}

    </div>
  );

/* ── AUTH PAGE ── */
function AuthPage({ onAuth }) {
  const [mode,setMode]=useState('signin');
  const [email,setEmail]=useState('');
  const [password,setPassword]=useState('');
  const [username,setUsername]=useState('');
  const [fav,setFav]=useState('nba');
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const color=getSportColor(fav);

  const submit=async()=>{
    setError('');setLoading(true);
    try {
      if(mode==='signup'){
        if(username.trim().length<2){setError('Username needs at least 2 characters');setLoading(false);return;}
        const{data,error:e}=await sb.auth.signUp({email,password,options:{data:{username:username.trim(),fav_sport:fav}}});
        if(e)throw e;
        if(data.session)onAuth(data.session);
        else setError('Check your email to confirm your account, then sign in.');
      } else {
        const{data,error:e}=await sb.auth.signInWithPassword({email,password});
        if(e)throw e;
        onAuth(data.session);
      }
    } catch(e){ setError(e.message); }
    setLoading(false);
  };

  return (
    <div className="onboard-wrap">
      <div className="onboard-logo"><svg width="32" height="26" viewBox="0 0 32 26" fill="none" style={{flexShrink:0}}><rect x="0.75" y="0.75" width="30.5" height="24.5" rx="5.25" fill="#0a84ff" fillOpacity="0.12" stroke="#0a84ff" strokeWidth="1.5"/><rect x="5" y="6" width="9" height="2.5" rx="1.25" fill="#0a84ff"/><rect x="20" y="6" width="7" height="2.5" rx="1.25" fill="#0a84ff"/><rect x="5" y="16.5" width="11" height="2.5" rx="1.25" fill="white" fillOpacity="0.35"/><rect x="20" y="16.5" width="7" height="2.5" rx="1.25" fill="white" fillOpacity="0.35"/></svg>BOXSCORE</div>
      <div className="onboard-sub">Rate. Review. Relive.</div>
      <div className="onboard-card">
        <div className="onboard-q">{mode==='signup'?'Create account':'Welcome back'}</div>
        <div className="onboard-hint">{mode==='signup'?'Join the community':'Sign in to your account'}</div>
        {mode==='signup'&&(<><div className="t-micro" style={{marginBottom:8}}>Username</div><input value={username} onChange={e=>setUsername(e.target.value)} placeholder="e.g. CourtKing99" style={{marginBottom:14}}/></>)}
        <div className="t-micro" style={{marginBottom:8}}>Email</div>
        <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="your@email.com" style={{marginBottom:14}}/>
        <div className="t-micro" style={{marginBottom:8}}>Password</div>
        <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" style={{marginBottom:mode==='signup'?14:20}} onKeyDown={e=>e.key==='Enter'&&submit()}/>
        {mode==='signup'&&(<><div className="t-micro" style={{marginBottom:10}}>Favorite sport</div><div style={{display:'flex',gap:7,marginBottom:20,flexWrap:'wrap'}}>{SPORT_PICKS.map(s=><div key={s.id} onClick={()=>setFav(s.id)} style={{flex:'1 1 auto',padding:'7px 4px',borderRadius:10,textAlign:'center',background:fav===s.id?`${getSportColor(s.id)}22`:'var(--s3)',border:`1.5px solid ${fav===s.id?getSportColor(s.id):'transparent'}`,cursor:'pointer',fontSize:10,fontWeight:700,color:fav===s.id?getSportColor(s.id):'var(--text2)',transition:'all 0.15s'}}><div style={{fontSize:18,marginBottom:2}}>{s.emoji}</div>{s.label}</div>)}</div></>)}
        {error&&<div style={{color:'var(--red)',fontSize:12,marginBottom:12,textAlign:'center',lineHeight:1.4}}>{error}</div>}
        <button className="btn btn-primary btn-full" style={{background:mode==='signup'?color:'var(--accent)',color:'#000',fontWeight:800,fontSize:15,opacity:loading?0.6:1}} onClick={submit} disabled={loading}>
          {loading?'Loading…':mode==='signup'?'Create account':'Sign in'}
        </button>
        <div style={{textAlign:'center',marginTop:16,fontSize:13,color:'var(--text3)'}}>
          {mode==='signup'?'Already have an account? ':"Don't have an account? "}
          <span style={{color:'var(--accent)',cursor:'pointer',fontWeight:600}} onClick={()=>{setMode(m=>m==='signup'?'signin':'signup');setError('');}}>
            {mode==='signup'?'Sign in':'Sign up'}
          </span>
        </div>
      </div>
    </div>
  );
}

/* ── ROOT APP ── */
function App() {
  const [session,  setSession]   = useState(null);
  const [profile,  setProfile]   = useState(null);
  const [games,    setGames]     = useState([]);
  const [reviews,  setReviews]   = useState([]);
  const [likes,    setLikes]     = useState([]);
  const [watchlist,setWatchlist] = useState([]);
  const [follows,   setFollows]   = useState([]);
  const [loading,  setLoading]   = useState(true);
  const [apiGames, setApiGames]  = useState([]);
  const [apiLoading, setApiLoading] = useState(false);
  const [route,    setRoute]     = useState({page:'home',params:{}});
  const [toast,    setToast]     = useState(null);
  const [addGame,  setAddGame]   = useState(false);
  const toastTimer = useRef(null);

  const fetchApiGames = useCallback(async()=>{
    setApiLoading(true);
    const sports=['nba','nfl','mlb','nhl','mls','epl'];
    // Fetch last 14 days per sport, 10 most recent games each
    const results = await Promise.all(sports.map(s=>fetchRecentLeagueGames(s,10,14)));
    const all = results.flat().sort((a,b)=>{
      // Live first, then by date descending
      const o={in:0,post:1,pre:2};
      const statusDiff=(o[a.status]||1)-(o[b.status]||1);
      if(statusDiff!==0)return statusDiff;
      return new Date(b.datetime||b.date)-new Date(a.datetime||a.date);
    });
    setApiGames(all);
    setApiLoading(false);
  },[]);

  // Lighter refresh every 60s: just today's live scores
  const refreshLive = useCallback(async()=>{
    const sports=['nba','nfl','mlb','nhl','mls','epl'];
    const results = await Promise.all(sports.map(fetchLeagueGames));
    const today = results.flat();
    if(!today.length)return;
    setApiGames(prev=>{
      const todayIds=new Set(today.map(g=>g.id));
      // Replace today's games, keep historical
      return [...today,...prev.filter(g=>!todayIds.has(g.id)&&g.status!=='in')]
        .sort((a,b)=>{const o={in:0,post:1,pre:2};const d=(o[a.status]||1)-(o[b.status]||1);return d!==0?d:new Date(b.datetime||b.date)-new Date(a.datetime||a.date);});
    });
  },[]);

  useEffect(()=>{
    if(!session) return;
    fetchApiGames(); // full 14-day fetch on load
    const id=setInterval(refreshLive,60000); // light live-score refresh every 60s
    return()=>clearInterval(id);
  },[session,fetchApiGames,refreshLive]);

    const navigate = (page,params={}) => setRoute({page,params});
  const showToast = useCallback(msg=>{ setToast(msg); clearTimeout(toastTimer.current); toastTimer.current=setTimeout(()=>setToast(null),2300); },[]);

  const loadData = useCallback(async(userId)=>{
    try {
      const [gR,rR,lR,wR,pR,fR] = await Promise.all([
        sb.from('games').select('*').order('date',{ascending:false}),
        sb.from('reviews').select('*').order('created_at',{ascending:false}),
        sb.from('likes').select('*'),
        sb.from('watchlist').select('game_id').eq('user_id',userId),
        sb.from('profiles').select('*').eq('id',userId).single(),
        sb.from('follows').select('*').eq('follower_id',userId),
      ]);
      setGames((gR.data||[]).map(normalizeGame));
      setReviews((rR.data||[]).map(normalizeReview));
      setLikes(lR.data||[]);
      setWatchlist((wR.data||[]).map(w=>w.game_id));
      setProfile(pR.data);
      setFollows(fR.data||[]);
    } catch(e){ console.error('loadData error',e); }
    setLoading(false);
  },[]);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{ setSession(session); if(session)loadData(session.user.id); else setLoading(false); });
    const {data:{subscription}}=sb.auth.onAuthStateChange((_e,session)=>{ setSession(session); if(!session){setGames([]);setReviews([]);setLikes([]);setWatchlist([]);setFollows([]);setProfile(null);} });
    return()=>subscription.unsubscribe();
  },[]);

  // Build state object compatible with all existing components
  const state = useMemo(()=>({
    games,
    apiGames,
    apiLoading,
    reviews: reviews.map(r=>({...r, likes: likes.filter(l=>l.review_id===r.id).map(l=>l.user_id)})),
    watchlist,
    follows,
    currentUser: { id: session?.user?.id||'', name: profile?.username||'' },
  }),[games,reviews,likes,watchlist,follows,session,profile]);

  const dispatch = useCallback(async(action)=>{
    const uid = session?.user?.id;
    if(!uid) return;
    switch(action.type){
      case 'ADD_REVIEW': {
        const r=action.review;
        const {data,error}=await sb.from('reviews').upsert({game_id:r.gameId,user_id:uid,username:profile.username,rating:r.rating,body:r.text,video_url:r.videoUrl||'',players:r.players||[]},{onConflict:'game_id,user_id'}).select().single();
        if(!error&&data) setReviews(prev=>[normalizeReview(data),...prev.filter(x=>!(x.gameId===r.gameId&&x.userId===uid))]);
        break;
      }
      case 'DELETE_REVIEW': {
        await sb.from('reviews').delete().eq('id',action.reviewId).eq('user_id',uid);
        setReviews(prev=>prev.filter(r=>r.id!==action.reviewId));
        break;
      }
      case 'TOGGLE_LIKE': {
        const isLiked=likes.some(l=>l.review_id===action.reviewId&&l.user_id===uid);
        if(isLiked){ await sb.from('likes').delete().match({review_id:action.reviewId,user_id:uid}); setLikes(prev=>prev.filter(l=>!(l.review_id===action.reviewId&&l.user_id===uid))); }
        else { const like={review_id:action.reviewId,user_id:uid}; await sb.from('likes').insert(like); setLikes(prev=>[...prev,like]); }
        break;
      }
      case 'ADD_WATCHLIST': { await sb.from('watchlist').insert({game_id:action.gameId,user_id:uid}); setWatchlist(prev=>[...prev,action.gameId]); break; }
      case 'REMOVE_WATCHLIST': { await sb.from('watchlist').delete().match({game_id:action.gameId,user_id:uid}); setWatchlist(prev=>prev.filter(id=>id!==action.gameId)); break; }
      case 'FOLLOW': { await sb.from('follows').insert({follower_id:uid,following_id:action.userId}); setFollows(prev=>[...prev,{follower_id:uid,following_id:action.userId}]); break; }
      case 'UNFOLLOW': { await sb.from('follows').delete().match({follower_id:uid,following_id:action.userId}); setFollows(prev=>prev.filter(f=>!(f.follower_id===uid&&f.following_id===action.userId))); break; }
      case 'ADD_GAME': {
        const g=action.game;
        const {data,error}=await sb.from('games').insert({id:g.id,sport:g.sport,league:g.league||g.sport,home:g.home,away:g.away,home_score:g.homeScore,away_score:g.awayScore,date:g.date,venue:g.venue||'',description:g.description||'',video_url:g.videoUrl||'',tags:g.tags||[],created_by:uid}).select().single();
        if(!error&&data) setGames(prev=>[normalizeGame(data),...prev]);
        break;
      }
      case 'UPSERT_API_GAME': {
        const g=action.game, id='api_'+g.apiId;
        const {data}=await sb.from('games').upsert({id,sport:g.sport,league:g.league||g.sport,home:g.home,away:g.away,home_score:g.homeScore??null,away_score:g.awayScore??null,date:g.date,venue:g.venue||'',description:'',video_url:'',tags:[],api_id:g.apiId,home_team_id:g.homeTeamId||null,away_team_id:g.awayTeamId||null,series_info:g.seriesInfo||null,series_type:g.seriesType||null,home_series_wins:g.homeSeriesWins??null,away_series_wins:g.awaySeriesWins??null,is_playoff:g.isPlayoff||false,created_by:uid},{onConflict:'id'}).select().single();
        const norm=data?{...normalizeGame(data),...g,id}:{...g,id,league:g.league||g.sport};
        setGames(prev=>{const ex=prev.find(x=>x.id===id);return ex?prev.map(x=>x.id===id?{...x,...norm}:x):[norm,...prev];});
        break;
      }
      case 'UPDATE_GAME_SERIES': {
        const {gameId,awaySeriesWins,homeSeriesWins,seriesType,isPlayoff}=action;
        // Update local state immediately (optimistic)
        setGames(prev=>prev.map(g=>g.id===gameId?{...g,awaySeriesWins,homeSeriesWins,seriesType,isPlayoff,seriesInfo:awaySeriesWins!==null?`Series: ${awaySeriesWins}–${homeSeriesWins}`:''}:g));
        // Persist to Supabase if it's a DB game
        await sb.from('games').update({away_series_wins:awaySeriesWins,home_series_wins:homeSeriesWins,series_type:seriesType||null,is_playoff:isPlayoff,series_info:awaySeriesWins!==null?`${awaySeriesWins}–${homeSeriesWins}`:null}).eq('id',gameId);
        // Also update apiGames state to reflect immediately
        setApiGames(prev=>prev.map(g=>g.id===gameId?{...g,awaySeriesWins,homeSeriesWins,seriesType,isPlayoff}:g));
        break;
      }
      case 'SET_USER_NAME': { await sb.from('profiles').update({username:action.name}).eq('id',uid); setProfile(prev=>({...prev,username:action.name})); break; }
    }
  },[session,profile,likes]);

  /* Loading screen */
  if(loading) return (
    <div style={{height:'100dvh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#000',gap:20}}>
      <div style={{fontSize:32,fontWeight:900,letterSpacing:-1}}>BENCH<span style={{color:'var(--accent)'}}>SCORE</span></div>
      <div className="spinner"/>
    </div>
  );

  /* Auth screen */
  if(!session) return <AuthPage onAuth={async(sess)=>{ setSession(sess); await loadData(sess.user.id); showToast('Welcome to BOXSCORE! 🎉'); }}/>;

  const activePage=route.page==='game'?null:route.page;
  const NAV=[{id:'home',label:'Home',Icon:IconHome},{id:'search',label:'Search',Icon:IconSearch},{id:'add',label:'',isAdd:true},{id:'leaderboard',label:'Top',Icon:IconTrophy},{id:'profile',label:'Profile',Icon:IconPerson}];

  return (
    <div style={{height:'100dvh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{flex:1,overflow:'hidden'}}>
        {route.page==='home'        &&<HomePage        state={state} navigate={navigate}/>}
        {route.page==='search'      &&<SearchPage      state={state} navigate={navigate}/>}
        {route.page==='leaderboard' &&<LeaderboardPage state={state} navigate={navigate}/>}
        {route.page==='profile'     &&<ProfilePage     state={state} dispatch={dispatch} navigate={navigate} showToast={showToast} onSignOut={()=>sb.auth.signOut()}/>}
        {route.page==='game'        &&<GamePage        gameId={route.params.gameId} state={state} dispatch={dispatch} navigate={navigate} showToast={showToast}/>}
        {route.page==='public_profile'&&<PublicProfilePage userId={route.params.userId} username={route.params.username} state={state} dispatch={dispatch} navigate={navigate} showToast={showToast}/>}
      </div>
      <div className="nav">
        {NAV.map(tab=>(
          <div key={tab.id} className={`nav-item${activePage===tab.id?' active':''}`} onClick={()=>{if(tab.isAdd){setAddGame(true);return;}navigate(tab.id);}}>
            {tab.isAdd?(<div className="nav-add-btn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>):(<><div className="nav-icon"><tab.Icon active={activePage===tab.id}/></div><span className="nav-label">{tab.label}</span></>)}
          </div>
        ))}
      </div>
      {addGame&&<AddGameSheet onClose={()=>setAddGame(false)} onSelect={async(g)=>{await dispatch({type:'UPSERT_API_GAME',game:g});setAddGame(false);navigate('game',{gameId:'api_'+g.apiId});}}/>}
      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
